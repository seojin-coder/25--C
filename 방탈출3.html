<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-POP Real Lyric Escape: Official</title>
    <style>
        :root { --bg: #05050a; --gold: #fbbf24; --door: #3d2b1f; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .room-container { position: relative; width: 100%; max-width: 800px; height: 600px; background: linear-gradient(to bottom, #1e293b, #0f172a); border-bottom: 50px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 0 0 100px rgba(0,0,0,0.8); }
        .stage-info { position: absolute; top: 20px; font-size: 1.5rem; font-weight: bold; color: var(--gold); }
        .door-frame { position: relative; width: 180px; height: 280px; background: #111; border: 8px solid #222; perspective: 1000px; }
        .door { width: 100%; height: 100%; background: var(--door); border: 2px solid #1a0f08; display: flex; justify-content: center; align-items: center; font-size: 2rem; cursor: pointer; transition: transform 1s ease-in-out; transform-origin: left; z-index: 10; }
        .door.open { transform: rotateY(-110deg); }
        .door::after { content: "🔒"; }
        .quiz-panel { display: none; position: absolute; background: rgba(22, 27, 34, 0.98); padding: 30px; border-radius: 20px; width: 620px; border: 2px solid var(--gold); z-index: 100; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .slot-group { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .slot { height: 50px; background: rgba(0,0,0,0.5); border: 2px dashed #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; padding: 0 15px; }
        .slot.target { border-color: var(--gold); background: rgba(251, 191, 36, 0.1); color: var(--gold); }
        .slot.filled { border-style: solid; border-color: #22c55e; color: white; background: rgba(34, 197, 94, 0.1); }
        .warehouse { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 15px; background: #0d1117; border-radius: 12px; min-height: 80px; }
        .lyric-piece { background: #334155; padding: 10px 14px; border-radius: 6px; cursor: grab; font-size: 0.85rem; border: 1px solid #475569; user-select: none; }
        .fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; transition: opacity 0.8s; z-index: 1000; }
        .fade-overlay.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="fade-overlay" id="fade-overlay"></div>

    <div class="room-container">
        <div class="stage-info" id="stage-text">ROOM 1</div>
        <div class="door-frame">
            <div class="door" id="main-door" onclick="showQuiz()"></div>
        </div>
        <p id="idol-hint-main" style="margin-top:20px; color: #64748b; font-weight: bold;">문을 클릭하여 정식 가사를 순서대로 맞추세요.</p>

        <div class="quiz-panel" id="quiz-panel">
            <h2 id="idol-name" style="color: var(--gold); margin: 0;">IDOL</h2>
            <p style="font-size: 0.8rem; color: #888;">노래가 시작되는 첫 부분부터 순서대로 배치하세요.</p>
            <div class="slot-group" id="slots"></div>
            <div class="warehouse" id="warehouse"></div>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
                <button style="padding:8px 15px; cursor:pointer;" onclick="alert('정답 곡: ' + stageData[currentStage].song)">힌트</button>
                <button style="padding:8px 15px; cursor:pointer;" onclick="document.getElementById('quiz-panel').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

<script>
    const stageData = [
        { 
            idol: "아이브(IVE)", 
            song: "I AM", 
            answer: ["어제보다 가뿐한 마음으로", "구름 위를 날아가", "Life is a beautiful galaxy"], 
            wrong: ["나르시시틱 My God I love it", "숨 참고 Love dive"] 
        },
        { 
            idol: "방탄소년단(BTS)", 
            song: "Dynamite", 
            answer: ["'Cause I-I-I'm in the stars tonight", "So watch me bring the fire", "And set the night alight"], 
            wrong: ["Butter on my pop", "Permission to Dance"] 
        },
        { 
            idol: "블랙핑크(BLACKPINK)", 
            song: "How You Like That", 
            answer: ["보란 듯이 무너졌어", "바닥 뚫고 저해 밑으로", "내 손을 잡아봐 다시 또 일어날 거야"], 
            wrong: ["Pink Venom", "Shut Down"] 
        },
        { 
            idol: "레드벨벳(Red Velvet)", 
            song: "Psycho", 
            answer: ["우린 참 별나고 이상해 서로를 부셔", "그리고 또 껴안아 난 널 참 이해 못 해", "어쩌면 그래서 더 특별한 우리"], 
            wrong: ["Rookie Rookie", "Red Flavor"] 
        },
        { 
            idol: "에스파(aespa)", 
            song: "Supernova", 
            answer: ["어디서 왔니 내 맞춤형", "사건은 다가와 ah oh ay", "Nova can't stop hyperstellar"], 
            wrong: ["Next Level", "Savage"] 
        },
        { 
            idol: "뉴진스(NewJeans)", 
            song: "Ditto", 
            answer: ["Stay in the middle", "Like you a little", "Don't want no riddle"], 
            wrong: ["Hype boy", "Attention"] 
        },
        { 
            idol: "르세라핌(LE SSERAFIM)", 
            song: "ANTIFRAGILE", 
            answer: ["잊지 마 내가 두고 온 신발", "그 어떤 시련도 나를 멈출 순 없어", "가시밭길 위로 Riding"], 
            wrong: ["Dress like crazy", "Fearless"] 
        },
        { 
            idol: "엔믹스(NMIXX)", 
            song: "별별별 (See that?)", 
            answer: ["See that? See that? See that?", "반짝이는 낯선 눈빛", "깜짝 놀랄걸 모두 다"], 
            wrong: ["DICE DICE", "넘어가버렸네 다들"] 
        }
    ];

    let currentStage = 0;
    let filledCount = 0;

    function showQuiz() {
        if (document.getElementById('main-door').classList.contains('open')) return;
        const data = stageData[currentStage];
        document.getElementById('idol-name').innerText = data.idol;
        filledCount = 0;
        const slots = document.getElementById('slots');
        slots.innerHTML = '';
        data.answer.forEach((text, i) => {
            const slot = document.createElement('div');
            slot.className = `slot ${i === 0 ? 'target' : ''}`;
            slot.innerText = `Line ${i + 1}`;
            slot.dataset.correct = text;
            slot.dataset.index = i;
            slot.ondragover = e => e.preventDefault();
            slot.ondrop = handleDrop;
            slots.appendChild(slot);
        });
        const warehouse = document.getElementById('warehouse');
        warehouse.innerHTML = '';
        const mixed = [...data.answer, ...data.wrong].sort(() => Math.random() - 0.5);
        mixed.forEach((txt, i) => {
            const piece = document.createElement('div');
            piece.className = 'lyric-piece';
            piece.innerText = txt;
            piece.draggable = true;
            piece.id = `piece-${i}`;
            piece.ondragstart = e => { e.dataTransfer.setData("text", e.target.id); e.dataTransfer.setData("val", txt); };
            warehouse.appendChild(piece);
        });
        document.getElementById('quiz-panel').style.display = 'block';
    }

    function handleDrop(e) {
        e.preventDefault();
        const val = e.dataTransfer.getData("val");
        const id = e.dataTransfer.getData("text");
        const idx = parseInt(this.dataset.index);
        if (idx !== filledCount) return alert("첫 줄부터 순서대로 맞추세요!");
        if (val === this.dataset.correct) {
            this.innerText = val;
            this.classList.remove('target');
            this.classList.add('filled');
            document.getElementById(id).style.visibility = 'hidden';
            filledCount++;
            const next = document.querySelectorAll('.slot')[filledCount];
            if (next) next.classList.add('target');
            if (filledCount === stageData[currentStage].answer.length) setTimeout(openDoor, 400);
        } else {
            alert("❌ 공식 가사와 다릅니다. 노래의 흐름을 생각하세요.");
        }
    }

    function openDoor() {
        document.getElementById('quiz-panel').style.display = 'none';
        document.getElementById('main-door').classList.add('open');
        setTimeout(() => {
            if (currentStage < 7) nextRoomEffect();
            else { alert("🎉 탈출 성공! 모든 방을 통과했습니다."); location.reload(); }
        }, 1500);
    }

    function nextRoomEffect() {
        const overlay = document.getElementById('fade-overlay');
        overlay.classList.add('show');
        setTimeout(() => {
            currentStage++;
            const door = document.getElementById('main-door');
            door.classList.remove('open');
            document.getElementById('stage-text').innerText = `ROOM ${currentStage + 1}`;
            overlay.classList.remove('show');
        }, 800);
    }
</script>
</body>
</html>
