<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>K-POP Stage Escape: Drag & Drop</title>
    <style>
        :root { --gold: #ffd700; --dark: #07070a; --panel: #161b22; --accent: #58a6ff; }
        body { font-family: 'Pretendard', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { margin-top: 30px; text-align: center; }
        .stage-nav { display: flex; gap: 10px; margin: 20px; }
        .stage-dot { width: 40px; height: 40px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #444; transition: 0.3s; }
        .stage-dot.active { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .stage-dot.cleared { background: var(--gold); color: black; border-color: var(--gold); }

        /* 게임 보드 */
        .game-board { background: var(--panel); width: 700px; padding: 40px; border-radius: 20px; border: 1px solid #30363d; display: none; flex-direction: column; align-items: center; }
        .game-board.show { display: flex; }

        /* 가사가 들어갈 빈칸 (Drop Zones) */
        .drop-zones { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; width: 100%; align-items: center; }
        .zone { width: 80%; height: 50px; border: 2px dashed #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); transition: 0.3s; color: #666; font-size: 0.9rem; }
        .zone.over { border-color: var(--accent); background: rgba(88, 166, 255, 0.1); }
        .zone.filled { border-style: solid; border-color: var(--gold); color: white; font-weight: bold; background: rgba(255, 215, 0, 0.1); }

        /* 아래쪽 가사 창고 (Drag Items) */
        .lyric-warehouse { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; background: #0d1117; border-radius: 15px; border: 1px solid #30363d; width: 100%; box-sizing: border-box; }
        .lyric-piece { background: #21262d; border: 1px solid #30363d; padding: 10px 15px; border-radius: 8px; cursor: grab; font-size: 0.95rem; transition: 0.2s; user-select: none; }
        .lyric-piece:hover { background: #30363d; border-color: #8b949e; }
        .lyric-piece:active { cursor: grabbing; }

        .btn-hint { margin-top: 20px; background: none; border: 1px solid #444; color: #888; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-hint:hover { color: var(--gold); border-color: var(--gold); }

        #hint-display { margin-top: 10px; font-weight: bold; color: var(--gold); min-height: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🔐 K-POP 가사 조각 맞추기</h1>
        <p>각 스테이지 아이돌의 가사를 찾아 빈칸에 순서대로 드래그하세요!</p>
    </div>

    <div class="stage-nav" id="stage-nav"></div>

    <div class="game-board" id="game-board">
        <h2 id="target-idol">아이돌 이름</h2>
        <div id="hint-display"></div>

        <div class="drop-zones" id="drop-zones">
            </div>

        <div class="lyric-warehouse" id="warehouse" ondrop="dropToWarehouse(event)" ondragover="allowDrop(event)">
            </div>

        <button class="btn-hint" onclick="showHint()">HINT: 곡명 보기</button>
    </div>

<script>
    const gameData = [
        { idol: "에스파(aespa)", song: "Supernova", answer: ["Su-su-su-Supernova", "사건은 다가와 ah oh ay", "Nova can't stop hyperstellar"], pool: ["Next Level", "Whiplash", "How Sweet", "나르시시틱"] },
        { idol: "뉴진스(NewJeans)", song: "How Sweet", answer: ["How sweet tastes like vanilla", "정말 Sweet하게 느껴져", "Stay in the middle"], pool: ["Ditto", "Attention", "Supernova", "Love Dive"] },
        { idol: "아이브(IVE)", song: "Love Dive", answer: ["나르시시틱 My God I love it", "서로를 비춘 밤", "숨 참고 Love dive"], pool: ["Kitsch", "After LIKE", "CRAZY", "Magnetic"] },
        { idol: "르세라핌(LE SSERAFIM)", song: "CRAZY", answer: ["Act like a angel", "Dress like crazy", "All the girls are girly girlys"], pool: ["EASY", "Smart", "Sticky", "별별별"] },
        { idol: "아일릿(ILLIT)", song: "Magnetic", answer: ["Baby I'm just magnetic", "You you you you like it", "너를 향한 마음이 치익치익"], pool: ["Cherish", "Lucky Girl", "How Sweet", "Supernova"] },
        { idol: "베이비몬스터", song: "SHEESH", answer: ["Got them all going SHEESH", "B-A-B-Y-M-O-N", "온 세상을 다 놀래킬 거야"], pool: ["BATTER UP", "DRIP", "Whiplash", "DICE"] },
        { idol: "키스오브라이프", song: "Sticky", answer: ["느낌 있게 Sticky", "더 뜨겁게 말이야", "Can't stop the feeling"], pool: ["Get Loud", "Midas Touch", "Love Dive", "Next Level"] },
        { idol: "엔믹스(NMIXX)", song: "별별별 (See that?)", answer: ["See that? 넘어가버렸네", "우린 저 별별별", "별의별 일이 다 생겨"], pool: ["DASH", "DICE", "CRAZY", "Attention"] }
    ];

    let currentStage = 0;
    let filledZones = 0;

    function initGame() {
        renderNav();
        loadStage(currentStage);
    }

    function renderNav() {
        const nav = document.getElementById('stage-nav');
        nav.innerHTML = '';
        gameData.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `stage-dot ${i === currentStage ? 'active' : ''} ${i < currentStage ? 'cleared' : ''}`;
            dot.innerText = i + 1;
            nav.appendChild(dot);
        });
    }

    function loadStage(idx) {
        const data = gameData[idx];
        document.getElementById('target-idol').innerText = `STAGE ${idx + 1}: ${data.idol}`;
        document.getElementById('hint-display').innerText = '';
        document.getElementById('game-board').classList.add('show');
        
        // 빈칸(Drop Zones) 생성
        const zonesContainer = document.getElementById('drop-zones');
        zonesContainer.innerHTML = '';
        filledZones = 0;
        data.answer.forEach((_, i) => {
            const zone = document.createElement('div');
            zone.className = 'zone';
            zone.innerText = `가사 조각 ${i + 1}을 여기에 놓으세요`;
            zone.dataset.index = i;
            zone.dataset.correct = data.answer[i];
            zone.ondragover = allowDrop;
            zone.ondragleave = dragLeave;
            zone.ondrop = dropToZone;
            zonesContainer.appendChild(zone);
        });

        // 가사 창고(Warehouse) 생성 - 정답 + 오답 섞기
        const warehouse = document.getElementById('warehouse');
        warehouse.innerHTML = '';
        const mixedPool = [...data.answer, ...data.pool].sort(() => Math.random() - 0.5);
        
        mixedPool.forEach((txt, i) => {
            const piece = document.createElement('div');
            piece.className = 'lyric-piece';
            piece.innerText = txt;
            piece.draggable = true;
            piece.id = "piece-" + i;
            piece.ondragstart = dragStart;
            warehouse.appendChild(piece);
        });
    }

    // 드래그 앤 드롭 로직
    function dragStart(e) {
        e.dataTransfer.setData("text", e.target.id);
        e.dataTransfer.setData("content", e.target.innerText);
    }

    function allowDrop(e) {
        e.preventDefault();
        if (e.target.classList.contains('zone')) {
            e.target.classList.add('over');
        }
    }

    function dragLeave(e) {
        e.target.classList.remove('over');
    }

    function dropToZone(e) {
        e.preventDefault();
        e.target.classList.remove('over');
        
        const content = e.dataTransfer.getData("content");
        const pieceId = e.dataTransfer.getData("text");
        const zoneIdx = parseInt(e.target.dataset.index);
        const correctText = e.target.dataset.correct;

        // 순서 체크: 이전 칸이 다 찼는지 확인
        if (zoneIdx > filledZones) {
            alert("순서대로 채워야 합니다!");
            return;
        }

        if (content === correctText) {
            e.target.innerText = content;
            e.target.classList.add('filled');
            e.target.ondrop = null; // 이미 채워진 칸은 드롭 불가
            document.getElementById(pieceId).style.visibility = 'hidden';
            filledZones++;

            // 스테이지 클리어 체크
            if (filledZones === gameData[currentStage].answer.length) {
                setTimeout(nextStage, 500);
            }
        } else {
            alert("❌ 이 스테이지의 정답 가사가 아니거나 순서가 틀렸습니다!");
        }
    }

    function nextStage() {
        alert(`🎉 STAGE ${currentStage + 1} 클리어!`);
        currentStage++;
        if (currentStage < gameData.length) {
            renderNav();
            loadStage(currentStage);
        } else {
            alert("🏆 CONGRATULATIONS! 모든 방을 탈출했습니다!");
            location.reload();
        }
    }

    function showHint() {
        document.getElementById('hint-display').innerText = `🎵 곡명: ${gameData[currentStage].song}`;
    }

    initGame();
</script>
</body>
</html>
