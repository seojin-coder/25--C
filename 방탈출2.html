<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-POP Lyric Escape Game</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --gold: #fbbf24;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--accent); }
        p.subtitle { color: #94a3b8; margin-bottom: 30px; }

        /* 스테이지 선택 바 */
        .stage-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stage-btn {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            background: var(--card-bg);
            border: 2px solid #334155;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: not-allowed;
            transition: 0.3s;
        }

        .stage-btn.active { border-color: var(--accent); color: var(--accent); cursor: pointer; }
        .stage-btn.cleared { background: var(--success); border-color: var(--success); color: white; cursor: pointer; }
        .stage-btn.current { border-color: var(--gold); color: var(--gold); transform: scale(1.1); box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }

        /* 게임 메인 카드 */
        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        .idol-name { font-size: 1.8rem; margin-bottom: 5px; color: var(--text); }
        .hint-text { color: var(--gold); font-size: 0.9rem; margin-bottom: 25px; height: 20px; }

        /* 가사 들어갈 빈칸 */
        .drop-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .slot {
            height: 55px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px dashed #475569;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            transition: 0.3s;
            font-weight: 500;
        }

        .slot.drag-over { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .slot.filled { border-style: solid; border-color: var(--accent); color: var(--text); background: rgba(56, 189, 248, 0.05); }

        /* 가사 창고 */
        .warehouse {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 15px;
            border: 1px solid #334155;
        }

        .lyric-piece {
            background: #334155;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: grab;
            font-size: 0.95rem;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .lyric-piece:hover { background: #475569; border-color: var(--accent); }
        .lyric-piece:active { cursor: grabbing; }

        .btn-hint {
            margin-top: 25px;
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-hint:hover { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>K-POP ESCAPE</h1>
        <p class="subtitle">섞여있는 가사 조각 중 정답을 찾아 순서대로(Stack) 배치하세요.</p>
    </div>

    <div class="stage-selector" id="stage-nav"></div>

    <div class="game-card">
        <div class="idol-name" id="target-idol">아이돌 로딩 중...</div>
        <div class="hint-text" id="hint-display"></div>

        <div class="drop-container" id="drop-zones"></div>

        <div class="warehouse" id="warehouse"></div>

        <button class="btn-hint" onclick="showHint()">HINT: 곡 제목 보기</button>
    </div>
</div>

<script>
    const gameData = [
        { idol: "에스파(aespa)", song: "Supernova", answer: ["Su-su-su-Supernova", "사건은 다가와 ah oh ay", "Nova can't stop hyperstellar"], wrong: ["Next Level", "Whiplash", "How Sweet"] },
        { idol: "뉴진스(NewJeans)", song: "How Sweet", answer: ["How sweet tastes like vanilla", "정말 Sweet하게 느껴져", "Stay in the middle"], wrong: ["Ditto", "Attention", "Love Dive"] },
        { idol: "아이브(IVE)", song: "Love Dive", answer: ["나르시시틱 My God I love it", "서로를 비춘 밤", "숨 참고 Love dive"], wrong: ["Kitsch", "After LIKE", "CRAZY"] },
        { idol: "르세라핌(LE SSERAFIM)", song: "CRAZY", answer: ["Act like a angel", "Dress like crazy", "All the girls are girly girlys"], wrong: ["EASY", "Smart", "Sticky"] },
        { idol: "아일릿(ILLIT)", song: "Magnetic", answer: ["Baby I'm just magnetic", "You you you you like it", "너를 향한 마음이 치익치익"], wrong: ["Cherish", "Lucky Girl", "Supernova"] },
        { idol: "베이비몬스터", song: "SHEESH", answer: ["Got them all going SHEESH", "B-A-B-Y-M-O-N", "온 세상을 다 놀래킬 거야"], wrong: ["BATTER UP", "DRIP", "DICE"] },
        { idol: "키스오브라이프", song: "Sticky", answer: ["느낌 있게 Sticky", "더 뜨겁게 말이야", "Can't stop the feeling"], wrong: ["Get Loud", "Midas Touch", "Love Dive"] },
        { idol: "엔믹스(NMIXX)", song: "별별별 (See that?)", answer: ["See that? 넘어가버렸네", "우린 저 별별별", "별의별 일이 다 생겨"], wrong: ["DASH", "DICE", "CRAZY"] }
    ];

    let currentStage = 0;
    let unlockedStage = 0;
    let filledCount = 0;

    function init() {
        renderNav();
        loadStage(currentStage);
    }

    function renderNav() {
        const nav = document.getElementById('stage-nav');
        nav.innerHTML = '';
        gameData.forEach((_, i) => {
            const btn = document.createElement('div');
            btn.className = `stage-btn ${i <= unlockedStage ? 'active' : ''} ${i < unlockedStage ? 'cleared' : ''} ${i === currentStage ? 'current' : ''}`;
            btn.innerText = i + 1;
            if (i <= unlockedStage) {
                btn.onclick = () => { currentStage = i; init(); };
            }
            nav.appendChild(btn);
        });
    }

    function loadStage(idx) {
        const data = gameData[idx];
        document.getElementById('target-idol').innerText = data.idol;
        document.getElementById('hint-display').innerText = '';
        filledCount = 0;

        // 빈칸 생성
        const zones = document.getElementById('drop-zones');
        zones.innerHTML = '';
        data.answer.forEach((text, i) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerText = `가사 조각 ${i + 1}`;
            slot.dataset.correct = text;
            slot.dataset.index = i;
            slot.ondragover = e => { e.preventDefault(); slot.classList.add('drag-over'); };
            slot.ondragleave = () => slot.classList.remove('drag-over');
            slot.ondrop = handleDrop;
            zones.appendChild(slot);
        });

        // 가사 창고 생성 (정답 + 타 그룹 가사 섞기)
        const warehouse = document.getElementById('warehouse');
        warehouse.innerHTML = '';
        const pool = [...data.answer, ...data.wrong].sort(() => Math.random() - 0.5);
        pool.forEach((txt, i) => {
            const piece = document.createElement('div');
            piece.className = 'lyric-piece';
            piece.innerText = txt;
            piece.draggable = true;
            piece.id = `lyric-${i}`;
            piece.ondragstart = e => { e.dataTransfer.setData("text", e.target.id); e.dataTransfer.setData("val", txt); };
            warehouse.appendChild(piece);
        });
    }

    function handleDrop(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        const val = e.dataTransfer.getData("val");
        const id = e.dataTransfer.getData("text");
        const correctVal = this.dataset.correct;
        const index = parseInt(this.dataset.index);

        if (index !== filledCount) {
            alert("순서대로 채워야 합니다!"); return;
        }

        if (val === correctVal) {
            this.innerText = val;
            this.classList.add('filled');
            document.getElementById(id).style.display = 'none';
            filledCount++;

            if (filledCount === gameData[currentStage].answer.length) {
                setTimeout(success, 500);
            }
        } else {
            alert("틀린 가사입니다! 이 그룹의 가사가 맞는지 확인하세요.");
        }
    }

    function success() {
        alert("🔓 STAGE CLEAR!");
        if (currentStage === unlockedStage && unlockedStage < 7) {
            unlockedStage++;
        }
        if (currentStage < 7) {
            currentStage++;
            init();
        } else {
            alert("🏆 축하합니다! 모든 방을 탈출했습니다!");
        }
    }

    function showHint() {
        document.getElementById('hint-display').innerText = `🎵 정답 곡명: ${gameData[currentStage].song}`;
    }

    init();
</script>
</body>
</html>
