<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키치 Trie 단어장 끝말잇기</title>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic+Coding:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-bg: #fdfcf0; 
      --accent-pink: #ffafcc; 
      --accent-blue: #a2d2ff; 
      --accent-yellow: #ffde59; 
      --accent-green: #caffbf; 
      --dark-text: #4a4a4a;
      --card-bg: #ffffff;
      --border-style: 3px solid #4a4a4a; 
    }

    body {
      font-family: 'Gaegu', cursive;
      background-color: var(--main-bg);
      color: var(--dark-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .game-wrapper {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      padding: 35px 25px;
      border: var(--border-style);
      border-radius: 40px;
      box-shadow: 10px 10px 0px #4a4a4a; 
      position: relative;
    }

    .deco-sticker {
      position: absolute;
      top: -20px;
      right: -10px;
      background: var(--accent-yellow);
      padding: 5px 15px;
      border: var(--border-style);
      border-radius: 20px;
      transform: rotate(15deg);
      font-weight: bold;
      font-size: 18px;
      z-index: 10;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 20px;
      color: var(--dark-text);
    }

    .status-area {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .status-pill {
      background: var(--accent-green);
      padding: 5px 15px;
      border: var(--border-style);
      border-radius: 25px;
      font-size: 18px;
      font-weight: bold;
    }

    .display-box {
      background: #fff;
      border: var(--border-style);
      border-radius: 30px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .current-word {
      font-size: 45px;
      color: var(--accent-pink);
      text-shadow: 2px 2px 0px #4a4a4a; 
      margin: 0;
      font-family: 'Nanum Gothic Coding', monospace;
    }

    .current-meaning {
      font-size: 18px;
      color: var(--dark-text);
      margin-top: 5px;
      font-weight: bold;
    }

    .input-container {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      padding: 15px 20px;
      font-size: 20px;
      border: var(--border-style);
      border-radius: 20px;
      background: #fff;
      font-family: 'Nanum Gothic Coding', monospace;
      outline: none;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      background: #fffef0;
    }

    .autocomplete-list {
      position: absolute;
      top: 105%;
      left: 0;
      right: 0;
      background: white;
      border: var(--border-style);
      border-radius: 20px;
      box-shadow: 5px 5px 0px #4a4a4a;
      z-index: 100;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete-item {
      padding: 12px 20px;
      border-bottom: 2px solid #eee;
      cursor: pointer;
      font-size: 20px;
      font-family: 'Nanum Gothic Coding', monospace;
    }

    .autocomplete-item strong {
      color: var(--accent-pink);
    }

    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--main-bg); color: var(--accent-blue); }

    .msg-box {
      text-align: center;
      height: 25px;
      font-size: 18px;
      margin-top: 15px;
      font-weight: bold;
    }

    /* 단어장 UI 추가 */
    .word-log-container {
      margin-top: 15px;
      background: #fff;
      border: 3px dashed var(--accent-blue);
      border-radius: 20px;
      padding: 15px;
      height: 140px;
      overflow-y: auto;
    }

    .word-log-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent-blue);
      text-align: center;
      margin-bottom: 10px;
      border-bottom: 2px dashed #eee;
      padding-bottom: 5px;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      padding: 5px 0;
      border-bottom: 1px dashed #eee;
    }

    .log-item .eng { font-family: 'Nanum Gothic Coding', monospace; font-weight: bold; color: var(--dark-text); }
    .log-item .kor { color: #888; font-size: 16px; }

  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="deco-sticker">A+ 💯</div>
  <h1>🎨 똑똑한 끝말잇기</h1>
  
  <div class="status-area">
    <div class="status-pill" style="background: var(--accent-yellow);">점수: <span id="scoreDisplay">0</span></div>
    <div class="status-pill">진행: <span id="turnDisplay">1</span>턴</div>
  </div>

  <div class="display-box">
    <p class="current-word" id="currentWordDisplay">START</p>
    <p class="current-meaning" id="currentMeaningDisplay">단어를 입력해 게임을 시작해!</p>
  </div>

  <div class="input-container">
    <input type="text" id="wordInput" placeholder="단어 입력 후 Enter" autocomplete="off">
    <div id="autocompleteList" class="autocomplete-list"></div>
  </div>

  <div class="msg-box" id="messageBox"></div>

  <div class="word-log-container" id="wordLog">
    <div class="word-log-title">📖 나만의 복습 단어장</div>
    <div id="logContent"></div>
  </div>
</div>

<script>
  // 1. 사전 데이터 (뜻 포함)
  const wordDict = {
    "apple": "사과", "application": "응용 프로그램", "array": "배열 (자료구조)", "algorithm": "알고리즘",
    "banana": "바나나", "band": "밴드", "bandwidth": "대역폭", "baddie": "악동/매력적인 악당", "byte": "바이트",
    "cat": "고양이", "car": "자동차", "care": "돌보다", "code": "코드", "cpu": "중앙처리장치",
    "data": "데이터", "database": "데이터베이스", "door": "문", "dynamite": "다이너마이트", "dash": "돌진하다",
    "edge": "간선 (그래프)", "error": "에러", "earth": "지구", "elephant": "코끼리",
    "function": "함수", "file": "파일", "folder": "폴더", "fire": "불",
    "graph": "그래프 (자료구조)", "game": "게임", "grape": "포도", "galaxy": "은하수",
    "html": "웹 마크업 언어", "home": "집", "human": "인간", "hype": "들뜨게 하다/과대광고",
    "internet": "인터넷", "image": "이미지", "island": "섬",
    "java": "자바 (프로그래밍 언어)", "jump": "점프", "juice": "주스",
    "keyboard": "키보드", "key": "열쇠", "koala": "코알라",
    "leaf": "리프 노드/나뭇잎", "list": "리스트", "loop": "반복문", "lion": "사자",
    "mango": "망고", "memory": "메모리", "mouse": "마우스", "moon": "달",
    "node": "노드", "network": "네트워크", "night": "밤", "note": "노트",
    "object": "객체", "orange": "오렌지", "ocean": "바다",
    "python": "파이썬", "pixel": "픽셀", "program": "프로그램", "pizza": "피자",
    "queue": "큐 (자료구조)", "query": "질의", "queen": "여왕",
    "root": "루트/뿌리", "ram": "램", "run": "실행하다", "rabbit": "토끼",
    "stack": "스택 (자료구조)", "search": "검색", "sort": "정렬", "system": "시스템", "supernova": "초신성",
    "tree": "트리 (자료구조)", "trie": "트라이 (자료구조)", "test": "테스트", "tiger": "호랑이",
    "user": "사용자", "url": "웹 주소", "umbrella": "우산",
    "variable": "변수", "value": "값", "venom": "독",
    "web": "웹", "word": "단어", "water": "물", "whale": "고래",
    "year": "연도", "yellow": "노란색",
    "zero": "숫자 0", "zoo": "동물원"
  };

  const dictionaryWords = Object.keys(wordDict);

  // 2. Trie 자료구조 구현
  class TrieNode {
    constructor() {
      this.children = {};
      this.isEnd = false;
    }
  }

  class Trie {
    constructor() { this.root = new TrieNode(); }
    insert(word) {
      let node = this.root;
      for (let char of word) {
        if (!node.children[char]) node.children[char] = new TrieNode();
        node = node.children[char];
      }
      node.isEnd = true;
    }
    autocomplete(prefix) {
      let node = this.root;
      for (let char of prefix) {
        if (!node.children[char]) return []; 
        node = node.children[char];
      }
      const results = [];
      this.collectWords(node, prefix, results);
      return results;
    }
    collectWords(node, currentWord, results) {
      if (node.isEnd) results.push(currentWord);
      for (let char in node.children) {
        this.collectWords(node.children[char], currentWord + char, results);
      }
    }
  }

  const trie = new Trie();
  dictionaryWords.forEach(word => trie.insert(word));

  // 3. 게임 상태 변수
  let currentWord = "";
  let usedWords = new Set();
  let score = 0;
  let turn = 1;

  // 4. DOM 요소
  const currentWordDisplay = document.getElementById('currentWordDisplay');
  const currentMeaningDisplay = document.getElementById('currentMeaningDisplay');
  const wordInput = document.getElementById('wordInput');
  const autocompleteList = document.getElementById('autocompleteList');
  const messageBox = document.getElementById('messageBox');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const turnDisplay = document.getElementById('turnDisplay');
  const logContent = document.getElementById('logContent');
  const wordLog = document.getElementById('wordLog');

  // 5. 이벤트 리스너: 입력 시 오리지널 영단어 자동완성 힌트 제공
  wordInput.addEventListener('input', function() {
    const inputVal = this.value.trim().toLowerCase();
    autocompleteList.innerHTML = '';

    if (inputVal.length === 0) {
      autocompleteList.style.display = 'none';
      return;
    }

    let requiredPrefix = inputVal;
    if (currentWord !== "") {
      const expectedFirstChar = currentWord.slice(-1);
      if (inputVal[0] !== expectedFirstChar) {
         autocompleteList.style.display = 'none';
         return;
      }
    }

    let suggestions = trie.autocomplete(requiredPrefix).filter(w => !usedWords.has(w));

    if (suggestions.length > 0) {
      autocompleteList.style.display = 'block';
      suggestions.slice(0, 5).forEach(word => { 
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        // 영단어만 보여주기 (기존 요청 유지)
        div.innerHTML = `<strong>${word.substring(0, inputVal.length)}</strong>${word.substring(inputVal.length)}`;
        
        div.addEventListener('click', function() {
          wordInput.value = word;
          autocompleteList.style.display = 'none';
          wordInput.focus();
        });
        autocompleteList.appendChild(div);
      });
    } else {
      autocompleteList.style.display = 'none';
    }
  });

  document.addEventListener('click', function(e) {
    if (e.target !== wordInput) autocompleteList.style.display = 'none';
  });

  // 6. 이벤트 리스너: 단어 제출 (Enter 키)
  wordInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const nextWord = this.value.trim().toLowerCase();
      
      if (!nextWord) return;
      if (!wordDict[nextWord]) { showMessage("사전에 없는 단어야!", "#ffafcc"); return; }
      if (usedWords.has(nextWord)) { showMessage("이미 썼던 단어야!", "#ffafcc"); return; }
      if (currentWord !== "" && nextWord[0] !== currentWord.slice(-1)) {
        showMessage(`'${currentWord.slice(-1)}'(으)로 시작해야 해!`, "#ffafcc");
        return;
      }

      // 정답 처리
      currentWord = nextWord;
      usedWords.add(nextWord);
      score += nextWord.length * 10;
      turn++;

      // 단어장에 추가
      const logItem = document.createElement('div');
      logItem.className = 'log-item';
      logItem.innerHTML = `<span class="eng">${currentWord}</span> <span class="kor">${wordDict[currentWord]}</span>`;
      logContent.prepend(logItem); // 최신 단어가 위로 오도록 추가
      wordLog.scrollTop = 0;

      // 화면 업데이트
      currentWordDisplay.textContent = currentWord.toUpperCase();
      currentMeaningDisplay.textContent = wordDict[currentWord]; // 현재 단어 뜻 표시
      scoreDisplay.textContent = score;
      turnDisplay.textContent = turn;
      wordInput.value = '';
      wordInput.placeholder = `'${currentWord.slice(-1).toUpperCase()}'로 시작하는 단어 입력`;
      autocompleteList.style.display = 'none';
      showMessage("정답! 단어장에 추가됐어 👍", "#a2d2ff"); 
    }
  });

  function showMessage(msg, color = "#4a4a4a") {
    messageBox.textContent = msg;
    messageBox.style.color = color;
    setTimeout(() => { messageBox.textContent = ""; }, 2000);
  }
</script>
</body>
</html>
