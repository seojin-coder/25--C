<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trie 스마트 끝말잇기</title>
  <style>
    :root {
      --primary-color: #0071e3;
      --bg-color: #f5f5f7;
      --box-bg: #ffffff;
      --text-main: #1d1d1f;
      --text-muted: #86868b;
      --border-color: #d2d2d7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .game-container {
      background: var(--box-bg);
      width: 100%;
      max-width: 480px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .status-board {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .word-display {
      text-align: center;
      font-size: 48px;
      font-weight: 700;
      margin: 30px 0;
      color: var(--primary-color);
      letter-spacing: 2px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      box-sizing: border-box;
      transition: border-color 0.3s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      max-height: 150px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .autocomplete-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .autocomplete-item:last-child {
      border-bottom: none;
    }

    .autocomplete-item:hover {
      background-color: #f5f5f7;
      color: var(--primary-color);
    }

    .message {
      text-align: center;
      min-height: 24px;
      margin-bottom: 20px;
      font-weight: 500;
      color: #e74c3c;
    }

    .edu-info {
      background: #eef2ff;
      padding: 20px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
    }

    .edu-info strong {
      color: var(--primary-color);
    }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>Trie 영단어 끝말잇기</h1>
    
    <div class="status-board">
      <span id="scoreDisplay">점수: 0</span>
      <span id="turnDisplay">진행: 1턴</span>
    </div>

    <div class="word-display" id="currentWordDisplay">
      START
    </div>

    <div class="message" id="messageBox">시작 단어를 입력하세요!</div>

    <div class="input-group">
      <input type="text" id="wordInput" placeholder="단어 입력 후 Enter" autocomplete="off">
      <div class="autocomplete-list" id="autocompleteList"></div>
    </div>

    <div class="edu-info">
      <strong>💡 Trie 자동완성 힌트</strong><br>
      단어가 기억나지 않는다면 시작 알파벳을 입력해 보세요. 1차원 배열이 아닌 글자 단위로 분기하는 <strong>Trie 구조</strong>가 O(m)의 속도로 가능한 단어 목록을 즉시 찾아줍니다.
    </div>
  </div>

  <script>
    // 1. Trie 자료구조 구현 (교안 참고)
    class TrieNode {
      constructor() {
        this.children = {};
        this.isEnd = false;
      }
    }

    class Trie {
      constructor() {
        this.root = new TrieNode();
      }

      insert(word) {
        let node = this.root;
        for (let char of word) {
          if (!node.children[char]) {
            node.children[char] = new TrieNode();
          }
          node = node.children[char];
        }
        node.isEnd = true;
      }

      autocomplete(prefix) {
        let node = this.root;
        for (let char of prefix) {
          if (!node.children[char]) {
            return []; // 접두사가 없으면 빈 배열 반환
          }
          node = node.children[char];
        }
        
        const results = [];
        this.collectWords(node, prefix, results);
        return results;
      }

      collectWords(node, currentWord, results) {
        if (node.isEnd) {
          results.push(currentWord);
        }
        for (let char in node.children) {
          this.collectWords(node.children[char], currentWord + char, results);
        }
      }
    }

    // 2. 게임 사전 데이터 
    // 교안에 등장한 단어들과 기본 영단어들로 구성
    const dictionaryWords = [
      "apple", "app", "application", "banana", "band", "bandwidth", "cat", "car", "care", "cherry", "data", "deep", "deer", "door", "database", "date", "edge", "grape", "leaf", "mango", "node", "orange", "peach", "root", "tree", "trie", "array", "stack", "queue", "graph", "search", "sort", "algorithm", "network", "system", "memory", "cpu", "ram", "byte", "bit", "pixel", "screen", "keyboard", "mouse", "laptop", "phone", "tablet", "web", "html", "java", "python", "code", "bug", "debug", "test", "run", "compile", "error", "success", "fail", "pass", "game", "play", "start", "end", "win", "lose", "score", "level", "point", "time", "clock", "watch", "hour", "minute", "second", "day", "week", "month", "year", "today", "tomorrow", "yesterday", "morning", "afternoon", "evening", "night", "sun", "moon", "star", "sky", "cloud", "rain", "snow", "wind", "storm", "fire", "water", "earth", "world", "space", "planet", "galaxy", "universe", "life", "human", "person", "man", "woman", "boy", "girl", "child", "friend", "family", "home", "house", "room", "city", "town", "village", "country", "nation", "state", "road", "street", "car", "bus", "train", "plane", "ship", "boat", "bike", "walk", "run", "jump", "fly", "swim"
    ];

    const trie = new Trie();
    dictionaryWords.forEach(word => trie.insert(word));

    // 3. 게임 상태 변수
    let currentWord = "";
    let usedWords = new Set();
    let score = 0;
    let turn = 1;

    // 4. DOM 요소
    const currentWordDisplay = document.getElementById('currentWordDisplay');
    const wordInput = document.getElementById('wordInput');
    const autocompleteList = document.getElementById('autocompleteList');
    const messageBox = document.getElementById('messageBox');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const turnDisplay = document.getElementById('turnDisplay');

    // 5. 이벤트 리스너: 입력 시 Trie 자동완성 힌트 제공
    wordInput.addEventListener('input', function() {
      const inputVal = this.value.trim().toLowerCase();
      autocompleteList.innerHTML = '';

      if (inputVal.length === 0) {
        autocompleteList.style.display = 'none';
        return;
      }

      // 게임 룰: 현재 단어가 있다면, 무조건 이전 단어의 마지막 글자로 시작해야 함
      let requiredPrefix = inputVal;
      if (currentWord !== "") {
        const expectedFirstChar = currentWord.slice(-1);
        // 사용자가 입력한 첫 글자가 올바른 끝말이 아니면 힌트 제공 불가
        if (inputVal[0] !== expectedFirstChar) {
           autocompleteList.style.display = 'none';
           return;
        }
      }

      // Trie를 이용해 O(m) 속도로 단어 검색
      let suggestions = trie.autocomplete(requiredPrefix);
      
      // 이미 사용한 단어 필터링
      suggestions = suggestions.filter(w => !usedWords.has(w));

      if (suggestions.length > 0) {
        autocompleteList.style.display = 'block';
        suggestions.slice(0, 5).forEach(word => { // 최대 5개까지만 표시
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          // 일치하는 부분 강조
          div.innerHTML = `<strong>${word.substring(0, inputVal.length)}</strong>${word.substring(inputVal.length)}`;
          
          div.addEventListener('click', function() {
            wordInput.value = word;
            autocompleteList.style.display = 'none';
            wordInput.focus();
          });
          autocompleteList.appendChild(div);
        });
      } else {
        autocompleteList.style.display = 'none';
      }
    });

    // 외부 클릭 시 자동완성 닫기
    document.addEventListener('click', function(e) {
      if (e.target !== wordInput) {
        autocompleteList.style.display = 'none';
      }
    });

    // 6. 이벤트 리스너: 단어 제출 (Enter 키)
    wordInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const nextWord = this.value.trim().toLowerCase();
        
        if (!nextWord) return;

        // 검증 로직
        if (!dictionaryWords.includes(nextWord)) {
          showMessage("사전에 없는 단어입니다.");
          return;
        }

        if (usedWords.has(nextWord)) {
          showMessage("이미 사용한 단어입니다.");
          return;
        }

        if (currentWord !== "") {
          const expectedFirstChar = currentWord.slice(-1);
          if (nextWord[0] !== expectedFirstChar) {
            showMessage(`'${expectedFirstChar}'(으)로 시작하는 단어를 입력해야 합니다.`);
            return;
          }
        }

        // 정답 처리
        currentWord = nextWord;
        usedWords.add(nextWord);
        score += nextWord.length * 10;
        turn++;

        // 화면 업데이트
        currentWordDisplay.textContent = currentWord.toUpperCase();
        scoreDisplay.textContent = `점수: ${score}`;
        turnDisplay.textContent = `진행: ${turn}턴`;
        wordInput.value = '';
        wordInput.placeholder = `'${currentWord.slice(-1).toUpperCase()}'로 시작하는 단어 입력`;
        autocompleteList.style.display = 'none';
        showMessage("성공!", "#2ecc71");
      }
    });

    function showMessage(msg, color = "#e74c3c") {
      messageBox.textContent = msg;
      messageBox.style.color = color;
      setTimeout(() => {
        messageBox.textContent = "";
      }, 2000);
    }
  </script>
</body>
</html>
