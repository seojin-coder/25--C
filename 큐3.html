<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>⚡ EMERGENCY: OVERWORKED ⚡</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --p: #38bdf8; --d: #ef4444; --s: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: #f1f5f9; text-align: center; margin: 0; padding: 20px; overflow: hidden; }
        .header { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #334155; }
        .work-area { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .ws { width: 160px; height: 120px; background: #0f172a; border: 3px solid #334155; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; }
        .ws.active { border-color: var(--p); box-shadow: 0 0 15px var(--p); }
        .btn-group { margin-bottom: 30px; }
        button { padding: 15px 30px; font-size: 1rem; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; margin: 0 10px; color: white; transition: 0.1s; }
        #pl { background: var(--s); } #pr { background: #f59e0b; }
        button:active { transform: scale(0.9); }
        .tray { background: rgba(30, 41, 59, 0.4); padding: 20px; border-radius: 20px; min-height: 180px; display: flex; align-items: flex-end; gap: 10px; overflow-x: auto; border: 2px dashed #475569; }
        .card { width: 90px; background: white; color: #1e293b; padding: 10px; border-radius: 12px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card.crit { border: 3px solid var(--d); animation: shake 0.2s infinite; }
        .pb { width: 100%; height: 5px; background: #ddd; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .pf { height: 100%; background: var(--d); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
    </style>
</head>
<body>
    <div class="header">
        <div>📈 실적: <span id="sc">0</span></div>
        <div>🌋 스트레스: <span id="st">0</span>%</div>
        <div id="sp" style="font-weight:bold; color:var(--s);">STATUS: OK</div>
    </div>
    <div class="work-area">
        <div class="ws" id="w0">👨‍💻 대기</div>
        <div class="ws" id="w1">👨‍💻 대기</div>
    </div>
    <div class="btn-group">
        <button id="pl" onclick="op('l')">💼 정석처리(Shift)</button>
        <button id="pr" onclick="op('r')">⚠️ 긴급반사(Pop)</button>
    </div>
    <div class="tray" id="ty"></div>
    <p style="color:#64748b; font-size:0.8rem;">* 7개 이상 적재 시 속도 0.3배 / 10개 이상 적재 시 즉시 게임오버</p>

    <script>
        const J = [
            { n: '보고서', i: '📝', t: 4, s: 8, c: false },
            { n: '전화', i: '📞', t: 3, s: 12, c: false },
            { n: '장애', i: '🚨', t: 2, s: 40, c: true },
            { n: '회의', i: '🤝', t: 7, s: 20, c: false }
        ];
        let q = [], w = [null, null], score = 0, stress = 0, rate = 1;

        function add() {
            if (q.length >= 10) die("업무 산더미로 인한 퇴사");
            q.push({ ...J[Math.floor(Math.random() * J.length)], p: 0 });
            u();
        }

        // [추가] 상사의 폭주: 10초마다 업무 3개 동시 투척
        setInterval(() => {
            for(let i=0; i<3; i++) setTimeout(add, i*300);
        }, 10000);

        function op(d) {
            if (q.length === 0) return;
            const i = w.findIndex(x => x === null);
            if (i === -1) return;
            w[i] = { ...(d === 'l' ? q.shift() : q.pop()), l: 0 };
            w[i].l = w[i].t;
            u();
        }

        function u() {
            document.getElementById('sc').innerText = score;
            document.getElementById('st').innerText = Math.floor(stress);
            const ty = document.getElementById('ty'); ty.innerHTML = '';
            q.forEach(x => {
                const c = document.createElement('div');
                c.className = `card ${x.c ? 'crit' : ''}`;
                c.innerHTML = `<div style="font-size:1.5rem">${x.i}</div><div style="font-size:0.7rem;font-weight:bold">${x.n}</div><div class="pb"><div class="pf" style="width:${x.p}%"></div></div>`;
                ty.appendChild(c);
            });
            w.forEach((x, i) => {
                const e = document.getElementById('w' + i);
                if (x) { e.className = 'ws active'; e.innerHTML = `<div style="font-size:1.5rem">${x.i}</div><b>${x.l.toFixed(1)}s</b>`; }
                else { e.className = 'ws'; e.innerHTML = '👨‍💻 대기'; }
            });
        }

        setInterval(() => {
            rate = (q.length >= 7) ? 0.3 : 1.0;
            const sTag = document.getElementById('sp');
            if(rate < 1) { sTag.innerText = "🚨 OVERLOAD"; sTag.style.color = "var(--d)"; }
            else { sTag.innerText = "STATUS: OK"; sTag.style.color = "var(--s)"; }

            for (let i = q.length - 1; i >= 0; i--) {
                q[i].p += (q[i].c ? 3 : 1.5);
                if (q[i].p >= 100) { stress += q[i].s; q.splice(i, 1); }
            }
            w.forEach((x, i) => {
                if (x) { x.l -= (0.1 * rate); if (x.l <= 0) { score += 20; w[i] = null; } }
            });
            if (stress >= 100) die("스트레스 한도 초과");
            u();
        }, 100);

        function die(m) { alert(m); location.reload(); }
        setInterval(add, 2200); // 평상시 업무 생성 속도도 2.2초로 단축
        add();
    </script>
</body>
</html>
