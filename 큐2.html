<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DEATH DEQUE: THE OFFICE</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: #f1f5f9; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            overflow: hidden;
        }

        /* 헤더 통계창 */
        .header-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .stat-item { font-size: 1.1rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; display: block; margin-bottom: 5px; }

        /* 업무 처리 구역 (PC) */
        .work-area { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
        .workstation {
            width: 180px; height: 140px;
            background: #0f172a;
            border: 3px solid #334155;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            position: relative;
        }
        .workstation.active { border-color: var(--primary); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); background: #1e293b; }
        .workstation.active::after { content: 'WORKING...'; position: absolute; top: -10px; background: var(--primary); color: #000; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        /* 버튼 그룹 */
        .btn-group { margin-bottom: 40px; }
        button {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin: 0 15px;
            transition: all 0.2s;
            color: white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        #popleft { background: var(--success); }
        #pop { background: var(--warning); }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: translateY(2px); box-shadow: none; }

        /* 덱(Deque) 렌더링 */
        .deque-tray {
            background: rgba(30, 41, 59, 0.5);
            padding: 30px;
            border-radius: 25px;
            min-height: 220px;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            overflow-x: auto;
            border: 2px dashed #334155;
        }

        .task-card {
            width: 110px;
            background: white;
            color: #1e293b;
            padding: 15px;
            border-radius: 15px;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .task-card.critical { border: 4px solid var(--danger); animation: shake 0.5s infinite; }
        .emoji-icon { font-size: 2.2rem; margin-bottom: 10px; }
        
        /* 프로그레스 바 */
        .pg-container { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .pg-fill { height: 100%; background: var(--danger); transition: width 0.1s linear; }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(2deg); } 75% { transform: rotate(-2deg); } }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-item">
            <span class="stat-label">🏢 실적 (Score)</span>
            <span id="score">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">🤯 스트레스 (Stress)</span>
            <span id="stress">0</span>%
        </div>
        <div class="stat-item">
            <span class="stat-label">⚡ 처리 속도 (Speed)</span>
            <span id="speed-tag">NORMAL</span>
        </div>
    </div>

    <div class="work-area">
        <div class="workstation" id="ws-0">👨‍💻 대기 중</div>
        <div class="workstation" id="ws-1">👨‍💻 대기 중</div>
    </div>

    <div class="btn-group">
        <button id="popleft" onclick="processTask('left')">💼 순차 처리 (popleft)</button>
        <button id="pop" onclick="processTask('right')">⚠️ 긴급 반사 (pop)</button>
    </div>

    <div class="deque-tray" id="deque">
        </div>

    <script>
        const JOBS = [
            { name: '주간 보고', icon: '📝', time: 5, stress: 10, crit: false },
            { name: '거래처 응대', icon: '📞', time: 4, stress: 15, crit: false },
            { name: '서버 터짐', icon: '🚨', time: 3, stress: 50, crit: true },
            { name: '부장님 면담', icon: '😰', time: 10, stress: 30, crit: false },
            { name: '커피 심부름', icon: '☕', time: 2, stress: 5, crit: false }
        ];

        let deque = [];
        let workstations = [null, null];
        let score = 0;
        let stress = 0;
        let speed = 1.0;

        function spawn() {
            const base = JOBS[Math.floor(Math.random() * JOBS.length)];
            deque.push({ ...base, progress: 0, id: Math.random() });
            render();
        }

        function processTask(dir) {
            if (deque.length === 0) return;
            const wsIdx = workstations.findIndex(ws => ws === null);
            if (wsIdx === -1) return;

            const task = (dir === 'left') ? deque.shift() : deque.pop();
            workstations[wsIdx] = { ...task, timeLeft: task.time };
            render();
        }

        function mainLoop() {
            // 1. 과부하 체크 (7개 이상이면 감속)
            speed = (deque.length >= 7) ? 0.4 : 1.0;
            document.getElementById('speed-tag').innerText = speed < 1 ? "SLOW" : "NORMAL";
            document.getElementById('speed-tag').style.color = speed < 1 ? "#ef4444" : "#22c55e";

            // 2. 덱 내부 업무 관리
            for (let i = deque.length - 1; i >= 0; i--) {
                deque[i].progress += (deque[i].crit ? 2.5 : 1.2);
                if (deque[i].progress >= 100) {
                    stress += deque[i].stress;
                    deque.splice(i, 1);
                }
            }

            // 3. 작업 진행
            workstations.forEach((ws, i) => {
                if (ws) {
                    ws.timeLeft -= (0.1 * speed);
                    if (ws.timeLeft <= 0) {
                        score += (ws.crit ? 50 : 20);
                        workstations[i] = null;
                    }
                }
            });

            if (stress >= 100) {
                clearInterval(tick); clearInterval(spawner);
                alert(`😱 [번아웃 발생] 최종 실적: ${score}\n당신은 야근의 굴레에서 벗어나지 못했습니다.`);
                location.reload();
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('stress').innerText = Math.floor(stress);
            
            const deqEl = document.getElementById('deque');
            deqEl.innerHTML = '';
            deque.forEach(t => {
                const card = document.createElement('div');
                card.className = `task-card ${t.crit ? 'critical' : ''}`;
                card.innerHTML = `
                    <div class="emoji-icon">${t.icon}</div>
                    <div style="font-weight:bold; font-size:0.8rem;">${t.name}</div>
                    <div class="pg-container"><div class="pg-fill" style="width:${t.progress}%"></div></div>
                `;
                deqEl.appendChild(card);
            });

            workstations.forEach((ws, i) => {
                const el = document.getElementById(`ws-${i}`);
                if (ws) {
                    el.className = 'workstation active';
                    el.innerHTML = `<div style="font-size:2rem">${ws.icon}</div><div style="font-weight:bold; color:var(--primary);">${ws.timeLeft.toFixed(1)}s</div>`;
                } else {
                    el.className = 'workstation';
                    el.innerHTML = '👨‍💻 대기 중';
                }
            });
        }

        function render() { updateUI(); }

        const tick = setInterval(mainLoop, 100);
        const spawner = setInterval(spawn, 3000);
        spawn();
    </script>
</body>
</html>
