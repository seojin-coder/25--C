<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키치 Trie 단어 던전</title>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic+Coding:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-bg: #fdfcf0; 
      --accent-pink: #ffafcc; 
      --accent-blue: #a2d2ff; 
      --accent-yellow: #ffde59; 
      --accent-green: #caffbf; 
      --accent-red: #ff8fab;
      --dark-text: #4a4a4a;
      --card-bg: #ffffff;
      --border-style: 3px solid #4a4a4a; 
    }

    body {
      font-family: 'Gaegu', cursive;
      background-color: var(--main-bg);
      color: var(--dark-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .game-wrapper {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      padding: 35px 25px;
      border: var(--border-style);
      border-radius: 40px;
      box-shadow: 10px 10px 0px #4a4a4a; 
      position: relative;
    }

    .deco-sticker {
      position: absolute;
      top: -20px;
      right: -10px;
      background: var(--accent-yellow);
      padding: 5px 15px;
      border: var(--border-style);
      border-radius: 20px;
      transform: rotate(15deg);
      font-weight: bold;
      font-size: 18px;
      z-index: 10;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 15px;
      color: var(--dark-text);
    }

    /* 던전 스테이지 정보 */
    .dungeon-info {
      text-align: center;
      margin-bottom: 15px;
      background: var(--dark-text);
      color: white;
      padding: 10px;
      border-radius: 15px;
      font-size: 18px;
    }

    .dungeon-info span { color: var(--accent-yellow); font-weight: bold; }

    .status-area {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .status-pill {
      background: var(--accent-green);
      padding: 5px 12px;
      border: var(--border-style);
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
    }

    /* 보스전 전용 타이머 바 */
    .timer-container {
      width: 100%;
      height: 15px;
      background: #eee;
      border: 2px solid var(--dark-text);
      border-radius: 10px;
      margin-bottom: 15px;
      overflow: hidden;
      display: none; /* 보스전에서만 표시 */
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background: var(--accent-red);
      transition: width 0.1s linear;
    }

    .display-box {
      background: #fff;
      border: var(--border-style);
      border-radius: 30px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .current-word {
      font-size: 40px;
      color: var(--accent-pink);
      text-shadow: 2px 2px 0px #4a4a4a; 
      margin: 0;
      font-family: 'Nanum Gothic Coding', monospace;
    }

    .current-meaning {
      font-size: 18px;
      color: var(--dark-text);
      margin-top: 5px;
      font-weight: bold;
    }

    .input-container { position: relative; }

    input[type="text"] {
      width: 100%;
      padding: 15px 20px;
      font-size: 20px;
      border: var(--border-style);
      border-radius: 20px;
      background: #fff;
      font-family: 'Nanum Gothic Coding', monospace;
      outline: none;
      box-sizing: border-box;
    }

    input[type="text"]:focus { background: #fffef0; }
    input:disabled { background: #eee; cursor: not-allowed; }

    .autocomplete-list {
      position: absolute;
      top: 105%;
      left: 0;
      right: 0;
      background: white;
      border: var(--border-style);
      border-radius: 20px;
      box-shadow: 5px 5px 0px #4a4a4a;
      z-index: 100;
      max-height: 180px;
      overflow-y: auto;
      display: none;
    }

    .autocomplete-item {
      padding: 12px 20px;
      border-bottom: 2px solid #eee;
      cursor: pointer;
      font-size: 20px;
      font-family: 'Nanum Gothic Coding', monospace;
    }

    .autocomplete-item strong { color: var(--accent-pink); }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: var(--main-bg); color: var(--accent-blue); }

    .msg-box {
      text-align: center;
      height: 25px;
      font-size: 18px;
      margin-top: 10px;
      font-weight: bold;
    }

    .word-log-container {
      margin-top: 15px;
      background: #fff;
      border: 3px dashed var(--accent-blue);
      border-radius: 20px;
      padding: 15px;
      height: 120px;
      overflow-y: auto;
    }

    .word-log-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent-blue);
      text-align: center;
      margin-bottom: 10px;
      border-bottom: 2px dashed #eee;
      padding-bottom: 5px;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      padding: 5px 0;
      border-bottom: 1px dashed #eee;
    }
    .log-item .eng { font-family: 'Nanum Gothic Coding', monospace; font-weight: bold; color: var(--dark-text); }
    .log-item .kor { color: #888; font-size: 16px; }

    /* 모달창 디자인 */
    .modal-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); border-radius: 40px;
      display: flex; justify-content: center; align-items: center;
      z-index: 200; display: none;
    }
    .modal-content {
      background: #fff; padding: 30px; border: var(--border-style);
      border-radius: 20px; text-align: center; box-shadow: 5px 5px 0px #ffde59;
    }
    .modal-btn {
      background: var(--accent-pink); color: #fff; border: var(--border-style);
      padding: 10px 20px; border-radius: 15px; font-size: 18px;
      cursor: pointer; font-family: 'Gaegu', cursive; margin-top: 15px;
    }

  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="deco-sticker" id="stageSticker">LV.1 🐣</div>
  <h1>⚔️ 단어 던전 끝말잇기</h1>

  <div class="dungeon-info" id="stageDesc">
    1층 슬라임 던전<br><span id="goalText">목표: 3단어 연결하기</span>
  </div>
  
  <div class="timer-container" id="timerBox">
    <div class="timer-bar" id="timerBar"></div>
  </div>

  <div class="status-area">
    <div class="status-pill" style="background: var(--accent-yellow);">점수: <span id="scoreDisplay">0</span></div>
    <div class="status-pill">진행: <span id="turnDisplay">0</span> / <span id="maxTurnDisplay">3</span></div>
  </div>

  <div class="display-box">
    <p class="current-word" id="currentWordDisplay">START</p>
    <p class="current-meaning" id="currentMeaningDisplay">던전에 입장했다!</p>
  </div>

  <div class="input-container">
    <input type="text" id="wordInput" placeholder="단어 입력 후 Enter" autocomplete="off">
    <div id="autocompleteList" class="autocomplete-list"></div>
  </div>

  <div class="msg-box" id="messageBox"></div>

  <div class="word-log-container" id="wordLog">
    <div class="word-log-title">📖 전리품 단어장</div>
    <div id="logContent"></div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <h2 id="modalTitle">던전 클리어!</h2>
      <p id="modalDesc">다음 층으로 이동합니다.</p>
      <button class="modal-btn" id="modalBtn">다음 층으로 GO</button>
    </div>
  </div>

</div>

<script>
  // 사전 데이터
  const wordDict = {
    "apple": "사과", "application": "응용 프로그램", "array": "배열", "algorithm": "알고리즘",
    "banana": "바나나", "band": "밴드", "bandwidth": "대역폭", "byte": "바이트",
    "cat": "고양이", "car": "자동차", "care": "돌보다", "code": "코드", "cpu": "중앙처리장치",
    "data": "데이터", "database": "데이터베이스", "door": "문", "dynamite": "다이너마이트",
    "edge": "간선", "error": "에러", "earth": "지구", "elephant": "코끼리", "eagle": "독수리",
    "function": "함수", "file": "파일", "fire": "불", "flower": "꽃",
    "graph": "그래프", "game": "게임", "grape": "포도", "galaxy": "은하수",
    "html": "웹 마크업 언어", "home": "집", "human": "인간", "hero": "영웅",
    "internet": "인터넷", "image": "이미지", "island": "섬", "ice": "얼음",
    "java": "자바", "jump": "점프", "juice": "주스",
    "keyboard": "키보드", "key": "열쇠", "koala": "코알라", "king": "왕",
    "leaf": "나뭇잎", "list": "리스트", "loop": "반복문", "lion": "사자",
    "mango": "망고", "memory": "메모리", "mouse": "마우스", "moon": "달",
    "node": "노드", "network": "네트워크", "night": "밤", "note": "노트",
    "object": "객체", "orange": "오렌지", "ocean": "바다", "owl": "부엉이",
    "python": "파이썬", "pixel": "픽셀", "program": "프로그램", "pizza": "피자",
    "queue": "큐", "query": "질의", "queen": "여왕", "quiz": "퀴즈",
    "root": "루트", "ram": "램", "run": "실행하다", "rabbit": "토끼", "robot": "로봇",
    "stack": "스택", "search": "검색", "sort": "정렬", "system": "시스템", "star": "별",
    "tree": "트리", "trie": "트라이", "test": "테스트", "tiger": "호랑이", "train": "기차",
    "user": "사용자", "url": "웹 주소", "umbrella": "우산", "uncle": "삼촌",
    "variable": "변수", "value": "값", "venom": "독", "violin": "바이올린",
    "web": "웹", "word": "단어", "water": "물", "whale": "고래", "wood": "나무껍질",
    "year": "연도", "yellow": "노란색", "yoyo": "요요",
    "zero": "숫자 0", "zoo": "동물원", "zebra": "얼룩말"
  };

  const dictionaryWords = Object.keys(wordDict);

  // Trie 구조
  class TrieNode { constructor() { this.children = {}; this.isEnd = false; } }
  class Trie {
    constructor() { this.root = new TrieNode(); }
    insert(word) {
      let node = this.root;
      for (let char of word) {
        if (!node.children[char]) node.children[char] = new TrieNode();
        node = node.children[char];
      }
      node.isEnd = true;
    }
    autocomplete(prefix) {
      let node = this.root;
      for (let char of prefix) {
        if (!node.children[char]) return []; 
        node = node.children[char];
      }
      const results = [];
      this.collect(node, prefix, results);
      return results;
    }
    collect(node, currentWord, results) {
      if (node.isEnd) results.push(currentWord);
      for (let char in node.children) this.collect(node.children[char], currentWord + char, results);
    }
  }

  const trie = new Trie();
  dictionaryWords.forEach(word => trie.insert(word));

  // 스테이지 데이터
  const stages = [
    { level: 1, name: "1층 슬라임 던전", goal: 3, rule: "목표: 3단어 연결", minLen: 0, hasTimer: false, time: 0, sticker: "LV.1 🐣", color: "var(--accent-green)" },
    { level: 2, name: "2층 고블린 동굴", goal: 5, rule: "목표: 5단어 (4글자 이상)", minLen: 4, hasTimer: false, time: 0, sticker: "LV.2 👺", color: "var(--accent-yellow)" },
    { level: 3, name: "최상층 드래곤 둥지", goal: 7, rule: "목표: 7단어 (15초 제한)", minLen: 0, hasTimer: true, time: 15, sticker: "BOSS 🐉", color: "var(--accent-red)" }
  ];

  let currentStageIdx = 0;
  let currentWord = "";
  let usedWords = new Set();
  let score = 0;
  let turnInStage = 0;
  
  let timerInterval;
  let timeLeft = 0;

  // DOM
  const elements = {
    wordDisp: document.getElementById('currentWordDisplay'),
    meanDisp: document.getElementById('currentMeaningDisplay'),
    input: document.getElementById('wordInput'),
    list: document.getElementById('autocompleteList'),
    msg: document.getElementById('messageBox'),
    score: document.getElementById('scoreDisplay'),
    turn: document.getElementById('turnDisplay'),
    maxTurn: document.getElementById('maxTurnDisplay'),
    log: document.getElementById('logContent'),
    stageDesc: document.getElementById('stageDesc'),
    goalText: document.getElementById('goalText'),
    sticker: document.getElementById('stageSticker'),
    timerBox: document.getElementById('timerBox'),
    timerBar: document.getElementById('timerBar'),
    modal: document.getElementById('modal'),
    modalTitle: document.getElementById('modalTitle'),
    modalDesc: document.getElementById('modalDesc'),
    modalBtn: document.getElementById('modalBtn')
  };

  function initStage() {
    const stage = stages[currentStageIdx];
    turnInStage = 0;
    currentWord = "";
    
    elements.stageDesc.innerHTML = `${stage.name}<br><span id="goalText">${stage.rule}</span>`;
    elements.sticker.innerText = stage.sticker;
    elements.turn.innerText = turnInStage;
    elements.maxTurn.innerText = stage.goal;
    elements.wordDisp.textContent = "START";
    elements.meanDisp.textContent = "자, 던전에 입장했다!";
    elements.input.value = "";
    elements.input.placeholder = "첫 단어를 입력해봐!";
    elements.input.disabled = false;
    elements.input.focus();
    
    if (stage.hasTimer) {
      elements.timerBox.style.display = "block";
      startTimer();
    } else {
      elements.timerBox.style.display = "none";
    }
  }

  function startTimer() {
    clearInterval(timerInterval);
    const stage = stages[currentStageIdx];
    timeLeft = stage.time;
    elements.timerBar.style.width = "100%";
    
    timerInterval = setInterval(() => {
      timeLeft -= 0.1;
      const percentage = (timeLeft / stage.time) * 100;
      elements.timerBar.style.width = `${percentage}%`;
      
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        gameOver("시간 초과! 드래곤의 브레스에 당했다 😭");
      }
    }, 100);
  }

  function gameOver(reason) {
    elements.input.disabled = true;
    showModal("GAME OVER", reason, "처음부터 다시 도전", () => {
      currentStageIdx = 0;
      score = 0;
      usedWords.clear();
      elements.score.innerText = "0";
      elements.log.innerHTML = "";
      initStage();
    });
  }

  function showModal(title, desc, btnText, callback) {
    elements.modalTitle.innerText = title;
    elements.modalDesc.innerText = desc;
    elements.modalBtn.innerText = btnText;
    elements.modal.style.display = "flex";
    elements.modalBtn.onclick = () => {
      elements.modal.style.display = "none";
      callback();
    };
  }

  // 자동완성 로직
  elements.input.addEventListener('input', function() {
    const val = this.value.trim().toLowerCase();
    elements.list.innerHTML = '';
    if (!val) { elements.list.style.display = 'none'; return; }
    if (currentWord && val[0] !== currentWord.slice(-1)) { elements.list.style.display = 'none'; return; }

    let sugs = trie.autocomplete(val).filter(w => !usedWords.has(w));
    if (sugs.length > 0) {
      elements.list.style.display = 'block';
      sugs.slice(0, 5).forEach(w => { 
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        div.innerHTML = `<strong>${w.substring(0, val.length)}</strong>${w.substring(val.length)}`;
        div.onclick = () => { elements.input.value = w; elements.list.style.display = 'none'; elements.input.focus(); };
        elements.list.appendChild(div);
      });
    } else { elements.list.style.display = 'none'; }
  });

  // 단어 제출
  elements.input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      const nextWord = this.value.trim().toLowerCase();
      const stage = stages[currentStageIdx];
      
      if (!nextWord) return;
      if (!wordDict[nextWord]) { showMsg("사전에 없는 마법이야!", "var(--accent-red)"); return; }
      if (usedWords.has(nextWord)) { showMsg("이미 쓴 마법이야!", "var(--accent-red)"); return; }
      if (currentWord && nextWord[0] !== currentWord.slice(-1)) { showMsg("끝말이 안 이어져!", "var(--accent-red)"); return; }
      if (nextWord.length < stage.minLen) { showMsg(`이 층에선 ${stage.minLen}글자 이상만 통과야!`, "var(--accent-red)"); return; }

      // 정답
      currentWord = nextWord;
      usedWords.add(nextWord);
      score += nextWord.length * 10;
      turnInStage++;

      // 타이머 리셋
      if (stage.hasTimer) startTimer();

      // UI 업데이트
      elements.wordDisp.textContent = currentWord.toUpperCase();
      elements.meanDisp.textContent = wordDict[currentWord];
      elements.score.textContent = score;
      elements.turn.textContent = turnInStage;
      elements.input.value = '';
      elements.input.placeholder = `'${currentWord.slice(-1).toUpperCase()}'로 시작하는 마법 주문`;
      elements.list.style.display = 'none';
      
      const logItem = document.createElement('div');
      logItem.className = 'log-item';
      logItem.innerHTML = `<span class="eng">${currentWord}</span> <span class="kor">${wordDict[currentWord]}</span>`;
      elements.log.prepend(logItem);
      
      showMsg("공격 성공! ⚔️", "var(--accent-blue)");

      // 스테이지 클리어 체크
      if (turnInStage >= stage.goal) {
        clearInterval(timerInterval);
        elements.input.disabled = true;
        
        if (currentStageIdx === stages.length - 1) {
          setTimeout(() => showModal("🎉 던전 완전 정복! 🎉", `최종 점수: ${score}점\n위대한 마법사로 인정합니다!`, "처음부터 다시하기", () => {
            currentStageIdx = 0; score = 0; usedWords.clear(); elements.score.innerText = "0"; elements.log.innerHTML = ""; initStage();
          }), 500);
        } else {
          setTimeout(() => showModal(`${stage.name} 클리어!`, "다음 층으로 진입합니다.", "GO!", () => {
            currentStageIdx++; initStage();
          }), 500);
        }
      }
    }
  });

  function showMsg(m, color) {
    elements.msg.textContent = m;
    elements.msg.style.color = color;
    setTimeout(() => { elements.msg.textContent = ""; }, 1500);
  }

  // 게임 시작
  initStage();
</script>
</body>
</html>
