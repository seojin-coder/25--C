<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>💣 큐-익스프레스 (Queue Express)</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: 'Pretendard', sans-serif; text-align: center; padding: 50px; overflow: hidden; }
        .game-container { background: #16213e; max-width: 450px; margin: auto; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 2px solid #0f3460; }
        h1 { color: #e94560; font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 10px #e94560; }
        
        /* 큐 시각화 */
        .queue-track { display: flex; gap: 10px; justify-content: center; margin: 30px 0; height: 80px; background: #0f3460; border-radius: 15px; align-items: center; padding: 0 15px; position: relative; }
        .bomb-node { width: 50px; height: 50px; background: #e94560; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; animation: shake 0.5s infinite; box-shadow: 0 0 15px #e94560; }
        .bomb-node.safe { background: #00d2ff; box-shadow: 0 0 15px #00d2ff; animation: none; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; }
        button { padding: 15px; border: none; border-radius: 15px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; }
        .btn-push { background: #e94560; color: white; }
        .btn-push:hover { transform: scale(1.05); background: #ff5e78; }
        
        #status { margin-top: 20px; font-size: 1rem; color: #95a5a6; height: 24px; }
        @keyframes shake { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }
        
        /* 터지는 연출 */
        .explosion { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; display: none; z-index: 1000; animation: flash 0.1s 5; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

<div id="explosion-layer" class="explosion"></div>

<div class="game-container">
    <h1>💣 QUEUE EXPRESS</h1>
    <p style="font-size: 0.9rem; color: #888;">큐가 꽉 차면(5개) 맨 앞의 폭탄이 터집니다!</p>

    <div class="queue-track" id="queue">
        </div>

    <div class="controls">
        <button class="btn-push" onclick="pushBomb()">💣 폭탄 투하 (EnQueue)</button>
        <div id="status">현재 큐 대기열: 0/5</div>
    </div>
</div>

<script>
    let queue = [];
    const MAX_SIZE = 5;
    const boomSound = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');

    function pushBomb() {
        const isRealBomb = Math.random() < 0.3; // 30% 확률로 진짜 폭탄 생성
        const bombType = isRealBomb ? '💣' : '📦';
        
        queue.push(bombType);
        render();

        if (queue.length > MAX_SIZE) {
            // FIFO: 맨 앞의 폭탄이 나감 (DeQueue)
            const outgoing = queue.shift();
            processOutcome(outgoing);
        }
    }

    function processOutcome(item) {
        if (item === '💣') {
            // 폭탄 당첨!
            document.getElementById('explosion-layer').style.display = 'block';
            setTimeout(() => {
                alert("💥 BOOM!!! 폭탄이 터졌습니다! 당신의 패배입니다.");
                location.reload();
            }, 500);
        } else {
            // 안전한 박스
            document.getElementById('status').innerText = "휴... 안전한 박스였습니다.";
            setTimeout(() => { document.getElementById('status').innerText = `현재 큐 대기열: ${queue.length}/${MAX_SIZE}`; }, 1000);
        }
        render();
    }

    function render() {
        const qEl = document.getElementById('queue');
        qEl.innerHTML = '';
        queue.forEach((type, i) => {
            const div = document.createElement('div');
            div.className = 'bomb-node' + (type === '📦' ? ' safe' : '');
            div.innerText = type;
            // 맨 앞(Front) 표시
            if(i === 0) div.style.border = "3px solid white";
            qEl.appendChild(div);
        });
        document.getElementById('status').innerText = `현재 큐 대기열: ${queue.length}/${MAX_SIZE}`;
    }
</script>
</body>
</html>
