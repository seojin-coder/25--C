<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>NYAN-NYAN Snack System v1.0</title>
    <style>
        body { background: #fff5f5; font-family: 'Nanum Gothic', sans-serif; text-align: center; padding: 50px; }
        #app { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid #ffb8b8; }
        h1 { color: #ff7675; font-size: 1.5rem; }
        
        /* 큐 시각화 */
        .queue-box { display: flex; gap: 10px; justify-content: center; margin: 20px 0; min-height: 80px; padding: 10px; background: #fff0f0; border-radius: 10px; align-items: center; }
        .cat-node { padding: 10px 15px; background: white; border: 2px solid #ff7675; border-radius: 10px; font-weight: bold; color: #ff7675; animation: bounce 0.5s; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #ff7675; color: white; }
        .btn-give { background: #555; color: white; }
        
        #log { margin-top: 20px; font-size: 0.9rem; color: #888; height: 50px; }
        @keyframes bounce { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <h1>🐱 냥냥 간식 배급 시스템</h1>
    <p style="font-size: 0.8rem; color: #999;">입장 순서대로 간식을 먹습니다 (FIFO)</p>

    <div class="queue-box" id="queue">
        </div>

    <div class="controls">
        <button class="btn-add" onclick="addCat()">고양이 줄 세우기</button>
        <button class="btn-give" onclick="giveSnack()">간식 주기 (DeQueue)</button>
    </div>

    <div id="log">준비 중...</div>
</div>

<script>
    const catNames = ["나비", "치즈", "초코", "미미", "루루"];
    let queue = [];
    let clickCount = 0;

    function addCat() {
        const name = catNames[Math.floor(Math.random() * catNames.length)];
        queue.push(name);
        document.getElementById('log').innerText = `${name}(이)가 줄을 섰습니다.`;
        render();
    }

    function giveSnack() {
        if (queue.length === 0) return;
        clickCount++;

        // 킹받는 로직 (교수님 낚시 포인트)
        if (clickCount % 3 === 0) {
            // 1. 갑자기 큐의 맨 앞이 아니라 '맨 뒤'에서 데이터가 나감 (LIFO인 척)
            const cat = queue.pop();
            document.getElementById('log').innerText = `[오류] 새치기 발생! ${cat}(이)가 먼저 먹었습니다.`;
        } else if (clickCount % 5 === 0) {
            // 2. 큐에서 데이터가 안 빠지고 이름만 바뀜
            queue[0] = "만우절 고양이";
            document.getElementById('log').innerText = `[시스템] 데이터 오염: 이름이 변조되었습니다.`;
        } else {
            // 정상 작동
            const cat = queue.shift();
            document.getElementById('log').innerText = `${cat}(이)가 맛있게 먹고 떠났습니다.`;
        }

        // 마지막 엔딩
        if (clickCount >= 7) {
            setTimeout(() => {
                alert("🐟 [만우절 메시지] \n\n교수님! 사실 이건 제가 만든 가짜 큐입니다.\n순서가 엉망진창인 건 버그가 아니라 제 마음이에요!\n오늘 하루도 즐겁게 보내세요! (첨지 올림)");
                location.reload();
            }, 500);
        }
        render();
    }

    function render() {
        const qEl = document.getElementById('queue');
        qEl.innerHTML = '';
        queue.forEach(name => {
            const div = document.createElement('div');
            div.className = 'cat-node';
            div.innerText = name;
            qEl.appendChild(div);
        });
    }

    addCat(); addCat();
</script>
</body>
</html>
