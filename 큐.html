<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>⚡ QUEUE WARS: DATA GUARDIAN</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-board { width: 800px; height: 400px; border: 2px solid #00f2ff; position: relative; background: rgba(0, 242, 255, 0.05); display: flex; align-items: center; justify-content: center; flex-direction: column; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
        
        .queue-display { display: flex; gap: 10px; min-width: 700px; height: 100px; border-top: 1px solid #333; border-bottom: 1px solid #333; align-items: center; justify-content: center; transition: all 0.3s; }
        .data-node { width: 60px; height: 60px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px rgba(0,0,0,0.5); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .controls { margin-top: 40px; display: flex; gap: 20px; }
        .skill-btn { padding: 15px 25px; background: transparent; border: 1px solid #00f2ff; color: #00f2ff; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .skill-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        
        #score-board { position: absolute; top: 20px; right: 40px; font-size: 1.5rem; }
        #msg-box { height: 30px; margin-top: 10px; color: #ff00ea; font-weight: bold; }
        
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="score-board">SCORE: <span id="score">0</span></div>

<div id="game-board">
    <div id="msg-box">준비...</div>
    <div class="queue-display" id="queue">
        </div>
    <div style="margin-top: 10px; font-size: 0.8rem; color: #555;">MAX CAPACITY: 10 (FIFO/LIFO Hybrid)</div>
</div>

<div class="controls">
    <button class="skill-btn" onclick="useSkill('REVERSE')">REVERSE (순서 반전)</button>
    <button class="skill-btn" onclick="useSkill('FLUSH')">FLUSH (Front 삭제)</button>
    <button class="skill-btn" onclick="useSkill('SORT')">AUTO-SORT (색상 정렬)</button>
</div>

<script>
    let queue = [];
    const MAX = 10;
    let score = 0;
    const colors = ['#00f2ff', '#ff00ea', '#fdf200', '#39ff14'];

    function init() {
        setInterval(spawnData, 2000); // 2초마다 데이터 자동 생성
        render();
    }

    function spawnData() {
        if (queue.length >= MAX) {
            alert("QUEUE OVERFLOW! 시스템이 붕괴되었습니다.\n최종 점수: " + score);
            location.reload();
            return;
        }

        const newData = {
            id: Math.random().toString(36).substr(2, 2).toUpperCase(),
            color: colors[Math.floor(Math.random() * colors.length)]
        };

        // 50% 확률로 왼쪽(shift) 혹은 오른쪽(push)에 삽입
        if (Math.random() > 0.5) {
            queue.push(newData);
            showMsg("New Data Enqueued to REAR");
        } else {
            queue.unshift(newData);
            showMsg("New Data Enqueued to FRONT");
        }

        checkCombo();
        render();
    }

    function checkCombo() {
        // 같은 색상이 3개 연속이면 삭제
        for (let i = 0; i <= queue.length - 3; i++) {
            if (queue[i].color === queue[i+1].color && queue[i+1].color === queue[i+2].color) {
                queue.splice(i, 3);
                score += 300;
                showMsg("COMBO! +300pts");
                document.getElementById('score').innerText = score;
                checkCombo(); // 재귀적으로 확인
                break;
            }
        }
    }

    function useSkill(type) {
        if (queue.length === 0) return;

        if (type === 'REVERSE') {
            queue.reverse();
            showMsg("SYSTEM REVERSED");
        } else if (type === 'FLUSH') {
            queue.shift();
            showMsg("FRONT DATA FLUSHED");
        } else if (type === 'SORT') {
            queue.sort((a, b) => a.color.localeCompare(b.color));
            showMsg("AUTO-SORTING COMPLETE");
        }
        
        checkCombo();
        render();
    }

    function showMsg(text) {
        document.getElementById('msg-box').innerText = `> ${text}`;
    }

    function render() {
        const qEl = document.getElementById('queue');
        qEl.innerHTML = '';
        queue.forEach((data, i) => {
            const node = document.createElement('div');
            node.className = 'data-node';
            node.style.backgroundColor = data.color;
            node.style.boxShadow = `0 0 15px ${data.color}`;
            node.innerText = data.id;
            qEl.appendChild(node);
        });
    }

    init();
</script>
</body>
</html>
