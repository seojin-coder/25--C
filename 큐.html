<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>만우절 특사: 덱 대리의 칼퇴 도전기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; color: #333; text-align: center; margin: 0; padding: 20px; }
        .game-title { color: #2c3e50; margin-bottom: 10px; }
        .stat-bar { display: flex; justify-content: center; gap: 30px; font-size: 1.2rem; margin-bottom: 20px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* 작업대 (내 책상) */
        .desk-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .pc { width: 140px; height: 100px; background-color: #ecf0f1; border: 3px solid #bdc3c7; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; }
        .pc.working { border-color: #3498db; background-color: #ebf5fb; animation: workingAnim 1s infinite alternate; }
        
        /* 제어 버튼 */
        .controls { margin-bottom: 30px; }
        button { padding: 12px 24px; font-size: 1rem; cursor: pointer; border: none; border-radius: 30px; margin: 0 10px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #btn-normal { background-color: #2ecc71; color: white; } /* 정석 처리 */
        #btn-reflect { background-color: #e67e22; color: white; } /* 반사 처리 */
        button:hover { transform: translateY(-3px); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 업무 덱 (Deque) */
        .deque-area { background: #fff; padding: 25px; border-radius: 20px; min-height: 180px; display: flex; align-items: flex-end; gap: 15px; overflow-x: auto; border: 2px solid #eee; }
        .task-card { width: 110px; padding: 15px; background: #fff; border: 2px solid #34495e; border-radius: 12px; position: relative; flex-shrink: 0; }
        .task-emoji { font-size: 2rem; margin-bottom: 10px; }
        .stress-label { font-size: 0.7rem; color: #e74c3c; font-weight: bold; margin-bottom: 5px; }
        .stress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
        .stress-fill { height: 100%; background: #e74c3c; transition: width 0.5s; }

        @keyframes workingAnim { from { box-shadow: 0 0 5px #3498db; } to { box-shadow: 0 0 20px #3498db; } }
    </style>
</head>
<body>

    <h1 class="game-title">👔 덱 대리의 "나 오늘 퇴근한다"</h1>
    <div class="stat-bar">
        <div>평판 점수: <span id="score">0</span> 📈</div>
        <div>스트레스 지수: <span id="stress">0</span> / 100 🌋</div>
    </div>

    <h3>💻 내 책상 (멀티태스킹 중)</h3>
    <div class="desk-container" id="pcs">
        <div class="pc" id="pc-0">휴식 중</div>
        <div class="pc" id="pc-1">휴식 중</div>
    </div>

    <div class="controls">
        <button id="btn-normal" onclick="handleTask('oldest')">정석대로 처리 (popleft)</button>
        <button id="btn-reflect" onclick="handleTask('newest')">"이미 했는데요?" (pop)</button>
    </div>

    <h3>📥 업무 대기열 (상사가 오른쪽에서 계속 던짐)</h3>
    <div class="deque-area" id="deque">
        </div>

    <script>
        const TASKS = [
            { type: 'report', emoji: '📂', time: 4, anger: 10, name: '주간 보고' },
            { type: 'call', emoji: '📞', time: 2, anger: 5, name: '거래처 전화' },
            { type: 'meeting', emoji: '📅', time: 8, anger: 20, name: '긴급 회의' },
            { type: 'coffee', emoji: '☕', time: 1, anger: 3, name: '부장님 커피' }
        ];

        let deque = [];
        let workstations = [null, null]; // 화구 대신 PC
        let score = 0;
        let stress = 0;
        let gameClock;

        function spawnTask() {
            const randomTask = TASKS[Math.floor(Math.random() * TASKS.length)];
            const task = { ...randomTask, currentAnger: 0 };
            deque.push(task); // 오른쪽 추가 (append)
            renderAll();
        }

        function handleTask(strategy) {
            if (deque.length === 0) return;
            
            const emptyIdx = workstations.findIndex(w => w === null);
            if (emptyIdx === -1) {
                alert("이미 손이 모자랍니다! (업무 과부하)");
                return;
            }

            let target;
            if (strategy === 'oldest') {
                target = deque.shift(); // 왼쪽 제거 (popleft)
                score += 5; // 정석 처리는 평판 상승
            } else {
                target = deque.pop(); // 오른쪽 제거 (pop)
                score += 15; // 순발력 있는 반사는 높은 점수
                stress += 5; // 하지만 괘쓸죄로 스트레스 약간 상승
            }

            workstations[emptyIdx] = { ...target, timeLeft: target.time };
            renderAll();
        }

        function gameLoop() {
            // 1. 덱 안의 업무들 '상사 분노도' 상승
            for (let i = deque.length - 1; i >= 0; i--) {
                deque[i].currentAnger += 2;
                if (deque[i].currentAnger >= 100) {
                    stress += deque[i].anger; // 상사가 폭발해서 내 스트레스 증가
                    deque.splice(i, 1);
                }
            }

            // 2. 내 PC 업무 처리
            for (let i = 0; i < workstations.length; i++) {
                if (workstations[i]) {
                    workstations[i].timeLeft -= 1;
                    if (workstations[i].timeLeft <= 0) {
                        workstations[i] = null;
                        score += 10;
                    }
                }
            }

            updateStats();
            renderAll();
            checkGameOver();
        }

        function renderAll() {
            // 덱 렌더링
            const dequeEl = document.getElementById('deque');
            dequeEl.innerHTML = '';
            deque.forEach(t => {
                dequeEl.innerHTML += `
                    <div class="task-card">
                        <div class="stress-label">상사 분노: ${t.currentAnger}%</div>
                        <div class="stress-bar"><div class="stress-fill" style="width:${t.currentAnger}%"></div></div>
                        <div class="task-emoji">${t.emoji}</div>
                        <div style="font-weight:bold; font-size:0.9rem;">${t.name}</div>
                    </div>
                `;
            });

            // PC 렌더링
            workstations.forEach((w, i) => {
                const pc = document.getElementById(`pc-${i}`);
                if (w) {
                    pc.className = 'pc working';
                    pc.innerHTML = `<span>${w.name}</span><span style="color:#3498db">${w.timeLeft}s</span>`;
                } else {
                    pc.className = 'pc';
                    pc.innerHTML = '휴식 중';
                }
            });
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            document.getElementById('stress').innerText = stress;
        }

        function checkGameOver() {
            if (stress >= 100) {
                clearInterval(gameClock);
                alert(`퇴사각! 최종 평판: ${score}\n스트레스가 한도를 초과했습니다.`);
                location.reload();
            }
        }

        function init() {
            spawnTask();
            gameClock = setInterval(gameLoop, 1000);
            setInterval(spawnTask, 4000);
        }

        init();
    </script>
</body>
</html>
