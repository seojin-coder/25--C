<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>큐 미궁 (Queue Maze) v1.0</title>
    <style>
        :root {
            --primary-color: #00ff00; /* 터미널 녹색 */
            --bg-color: #1a1a1a;
            --error-color: #ff4444;
            --success-color: #44ff44;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 80%;
            max-width: 600px;
            background: #000;
            border: 2px solid var(--primary-color);
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        #header {
            text-align: center;
            border-bottom: 1px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        #header h1 { margin: 0; font-size: 1.5rem; }
        #header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.8; }

        #game-view {
            min-height: 200px;
            margin-bottom: 20px;
        }

        #question-text {
            font-size: 1.1rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
        }

        #user-input:focus {
            outline: none;
            box-shadow: 0 0 5px var(--primary-color);
        }

        #submit-btn {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #submit-btn:hover {
            background: #fff;
        }

        #queue-visual {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        #queue-status {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #aaa;
        }

        #queue-items {
            display: flex;
            gap: 5px;
            min-height: 30px;
        }

        .queue-box {
            border: 1px solid #555;
            padding: 5px 10px;
            font-size: 0.8rem;
            color: #aaa;
            background: #222;
        }

        .queue-box.front {
            border-color: var(--error-color);
            color: var(--error-color);
            font-weight: bold;
        }

        #log {
            margin-top: 15px;
            font-size: 0.85rem;
            height: 60px;
            overflow-y: auto;
            color: #ccc;
        }

        .log-error { color: var(--error-color); }
        .log-success { color: var(--success-color); }

        /* 모달 (엔딩 화면) */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #modal-content {
            background: #000;
            border: 3px solid var(--success-color);
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px var(--success-color);
        }

        #modal-content h2 { color: var(--success-color); margin-top: 0; }
        #modal-content p { color: #fff; font-size: 1.2rem; line-height: 1.6; }
        #restart-btn {
            margin-top: 20px;
            background: var(--success-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="header">
            <h1>:: C-OS Security 인증 ::</h1>
            <p>모든 노드를 비워 시스템에서 로그아웃하세요.</p>
        </div>

        <div id="game-view">
            <div id="question-text">시스템 초기화 중...</div>
            
            <div id="input-area">
                <input type="text" id="user-input" placeholder="정답 입력..." autocomplete="off">
                <button id="submit-btn">전송</button>
            </div>

            <div id="log"></div>

            <div id="queue-visual">
                <div id="queue-status">현재 대기 큐 (Front는 빨간색)</div>
                <div id="queue-items">
                    </div>
            </div>
        </div>
    </div>

    <div id="modal">
        <div id="modal-content">
            <h2>🎉 SYSTEM UNLOCKED!</h2>
            <p>축하합니다!<br>큐 미궁을 성공적으로 탈출하셨습니다.</p>
            <p style="font-size: 1.5rem; color: #ff00ff; margin-top: 15px;">
                사실 오늘은 <strong>만우절</strong>이지롱! 🤪<br>
                (큐가 1턴씩 밀리게 만들었지)
            </p>
            <button id="restart-btn" onclick="location.reload()">다시 하기</button>
        </div>
    </div>

    <script>
        // 게임 데이터
        const stages = [
            { q: "1. 큐(Queue)는 먼저 넣은 데이터가 먼저 나오는 구조입니다. 이를 무엇이라 할까요? (영어 4글자)", a: "FIFO" },
            { q: "2. 큐의 맨 뒤에 데이터를 추가하는 연산을 무엇이라 하나요? (영어 7글자)", a: "ENQUEUE" },
            { q: "3. 큐가 꽉 차서 데이터를 더 이상 넣을 수 없는 상태를 무엇이라 하나요? (영어 8글자)", a: "OVERFLOW" },
            { q: "4. (마지막) 파이썬에서 큐를 구현할 때 리스트보다 효율적인 모듈은? (D로 시작)", a: "DEQUE" }
        ];

        let currentStageIndex = 0;
        let lieQueue = []; // 데이터를 쌓아둘 '거짓말 큐'
        let hasTriggeredLie = false; // 거짓말 로직이 시작되었는지 확인

        // DOM 요소
        const questionText = document.getElementById('question-text');
        const userInput = document.getElementById('user-input');
        const submitBtn = document.getElementById('submit-btn');
        const logArea = document.getElementById('log');
        const queueItems = document.getElementById('queue-items');
        const modal = document.getElementById('modal');

        // 초기화
        function initGame() {
            currentStageIndex = 0;
            lieQueue = [];
            hasTriggeredLie = false;
            logArea.innerHTML = '';
            userInput.value = '';
            showQuestion();
            updateQueueVisual();
            addLog("시스템 접속 완료. 인증을 시작합니다.");
        }

        // 질문 표시
        function showQuestion() {
            if (currentStageIndex < stages.length) {
                questionText.innerText = stages[currentStageIndex].q;
            } else {
                // 모든 문제 제출 후 큐가 비워질 때까지 기다림
                questionText.innerText = "모든 인증 노드 제출 완료. 큐 비우기 대기 중...";
            }
        }

        // 큐 시각화 업데이트
        function updateQueueVisual() {
            queueItems.innerHTML = '';
            lieQueue.forEach((item, index) => {
                const box = document.createElement('div');
                box.classList.add('queue-box');
                if (index === 0) box.classList.add('front'); // 맨 앞은 빨간색
                box.innerText = item;
                queueItems.appendChild(box);
            });
        }

        // 로그 추가
        function addLog(message, type = '') {
            const p = document.createElement('p');
            p.margin = '2px 0';
            if (type === 'error') p.classList.add('log-error');
            if (type === 'success') p.classList.add('log-success');
            p.innerText = `> ${message}`;
            logArea.appendChild(p);
            logArea.scrollTop = logArea.scrollHeight; // 자동 스크롤
        }

        // 정답 제출 처리 (핵심 로직)
        function submitAnswer() {
            const ans = userInput.value.trim();
            if (!ans) return;

            userInput.value = ''; // 입력창 비우기

            // 1. 입력된 값을 큐에 무조건 넣음 (EnQueue)
            lieQueue.push(ans);
            updateQueueVisual();
            addLog(`입력값 '${ans}'을(를) 시스템 큐에 등록(EnQueue).`);

            // 2. 만우절 킹받는 로직: 
            // 현재 문제의 정답(stages[currentStageIndex].a)을 확인하는 게 아니라,
            // '큐의 맨 앞(Front)'에 있는 값(lieQueue[0])을 확인합니다.
            
            // 첫 번째 문제는 무조건 틀리게 만들기 위해, 
            // 첫 입력때는 검증을 건너뛰거나 무조건 실패하게 함.
            if (!hasTriggeredLie) {
                hasTriggeredLie = true;
                setTimeout(() => {
                    addLog(`[검증 실패] 큐 Front에 인증 데이터가 없습니다. (대기 중)`, 'error');
                }, 500);
                return; 
            }

            // 진짜 검증 로직 (1턴 밀려서 처리됨)
            setTimeout(() => {
                const currentFront = lieQueue[0];
                const realAnswer = stages[currentStageIndex].a.toUpperCase();

                if (currentFront.toUpperCase() === realAnswer) {
                    // 성공 (DeQueue)
                    lieQueue.shift(); // 큐에서 꺼냄
                    updateQueueVisual();
                    addLog(`[검증 성공] 노드 ${currentStageIndex + 1} 인증 완료.`, 'success');
                    currentStageIndex++;
                    showQuestion();

                    // 모든 스테이지 클리어 및 큐가 비었는지 확인
                    if (currentStageIndex === stages.length && lieQueue.length === 0) {
                        setTimeout(() => { modal.style.display = 'flex'; }, 1000);
                    }
                } else {
                    // 실패 (큐를 비우지 못함)
                    addLog(`[검증 실패] 큐 Front의 '${currentFront}'은(는) 노드 ${currentStageIndex+1}의 정답이 아닙니다.`, 'error');
                    addLog(`!!! 큐의 Front를 정답으로 만들어서 비워야 합니다 !!!`);
                }
            }, 800);
        }

        // 이벤트 리스너
        submitBtn.addEventListener('click', submitAnswer);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitAnswer();
        });

        // 게임 시작
        initGame();

    </script>
</body>
</html>
