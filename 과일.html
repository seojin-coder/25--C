<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>과일 짝 맞추기 게임</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #ui { margin-top: 10px; text-align: center; }
        .target { color: #f1c40f; font-weight: bold; font-size: 24px; }
        .score-board { display: flex; gap: 20px; font-size: 18px; margin: 10px 0; }

        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: #34495e;
            border: 5px solid #ecf0f1;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 15px;
        }
        .fruit {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 4px solid transparent;
        }
        .fruit:hover { transform: scale(1.05); }
        .fruit.selected {
            border-color: #f1c40f;
            box-shadow: 0 0 15px #f1c40f;
            transform: scale(1.1);
        }
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #game-over h2 { font-size: 50px; color: #e74c3c; margin-bottom: 10px; }
        #game-over p { font-size: 24px; margin: 5px 0; }
        #restart-btn {
            margin-top: 20px; padding: 10px 30px;
            font-size: 20px; background: #2ecc71; color: white;
            border: none; border-radius: 5px; cursor: pointer;
        }
        #restart-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Fruit Matcher</h1>
        <p>화면에서 같은 종류의 과일을 연속으로 클릭하세요!</p>
        <div class="score-board">
            <div>남은 시간: <span id="timer">60</span>초</div>
            <div>점수: <span id="score">0</span></div>
            <div>최고 기록: <span id="best-score">0</span></div>
        </div>
    </div>

    <div id="game-container">
        <div id="game-over">
            <h2>게임 종료!</h2>
            <p>최종 점수: <span id="final-score">0</span></p>
            <p>최고 기록: <span id="final-best">0</span></p>
            <button id="restart-btn" onclick="Game.init()">다시 시작</button>
        </div>
    </div>

    <script>
        // 과일 데이터 정의 (약 10가지 이상)
        const fruitsData = [
            { name: '사과', icon: '🍎' },
            { name: '포도', icon: '🍇' },
            { name: '오렌지', icon: '🍊' },
            { name: '레몬', icon: '🍋' },
            { name: '바나나', icon: '🍌' },
            { name: '수박', icon: '🍉' },
            { name: '딸기', icon: '🍓' },
            { name: '멜론', icon: '🍈' },
            { name: '복숭아', icon: '🍑' },
            { name: '파인애플', icon: '🍍' },
            { name: '키위', icon: '🥝' },
            { name: '망고', icon: '🥭' }
        ];

        // --- 과일 클래스 ---
        class Fruit {
            constructor(data, id) {
                this.data = data;
                this.id = id;
                this.x = 0;
                this.y = 0;
                this.element = this.createVisual();
                this.isMatched = false;
            }

            createVisual() {
                const el = document.createElement('div');
                el.className = 'fruit';
                el.innerHTML = this.data.icon;
                el.style.backgroundColor = this.getRandomColor();
                el.onclick = () => Game.handleFruitClick(this);
                return el;
            }

            getRandomColor() {
                const colors = ['#e74c3c', '#9b59b6', '#f39c12', '#f1c40f', '#2ecc71', '#3498db'];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            // 새로운 랜덤 위치 설정
            respawn() {
                this.x = Math.random() * (800 - 80) + 10; // 컨테이너 너비 - 과일 너비
                this.y = Math.random() * (500 - 80) + 10; // 컨테이너 높이 - 과일 높이
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.classList.remove('selected'); // 선택 표시 제거
                this.element.style.display = 'flex'; // 다시 보이게
                this.isMatched = false;
            }

            select() { this.element.classList.add('selected'); }
            deselect() { this.element.classList.remove('selected'); }
            match() {
                this.element.style.display = 'none'; // 매칭되면 숨김
                this.isMatched = true;
            }
        }

        // --- 게임 관리 객체 (배열 기반) ---
        const Game = {
            fruits: [], // 화면의 모든 과일 객체를 담는 배열
            selectedFruit: null, // 현재 선택된 첫 번째 과일
            score: 0,
            timeLeft: 60,
            timerInterval: null,
            bestScore: localStorage.getItem('fruitBestScore') || 0,
            countPerType: 2, // 각 과일 종류당 몇 개씩 생성할지
            container: document.getElementById('game-container'),

            init() {
                // 초기화
                this.container.innerHTML = ''; // 기존 과일 제거
                this.container.appendChild(document.getElementById('game-over')); // 게임오버 화면은 유지
                document.getElementById('game-over').style.display = 'none';
                this.fruits = [];
                this.selectedFruit = null;
                this.score = 0;
                this.timeLeft = 60;
                
                // 최고 기록 UI 업데이트
                document.getElementById('best-score').innerText = this.bestScore;

                // 1. 과일 객체 생성 및 배열에 추가
                let idCounter = 0;
                fruitsData.forEach(fruitData => {
                    for (let i = 0; i < this.countPerType; i++) {
                        const newFruit = new Fruit(fruitData, idCounter++);
                        this.fruits.push(newFruit);
                        this.container.appendChild(newFruit.element);
                        newFruit.respawn(); // 위치 지정
                    }
                });

                this.updateUI();
                
                // 2. 타이머 시작
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => this.tick(), 1000);
            },

            tick() {
                this.timeLeft--;
                this.updateUI();
                if (this.timeLeft <= 0) {
                    this.endGame();
                }
            },

            // 핵심 로직: 과일 클릭 처리
            handleFruitClick(clickedFruit) {
                // 이미 매칭된 과일이거나, 동일한 과일을 다시 클릭한 경우 무시
                if (clickedFruit.isMatched || clickedFruit === this.selectedFruit) return;

                if (!this.selectedFruit) {
                    // 첫 번째 과일 선택
                    this.selectedFruit = clickedFruit;
                    this.selectedFruit.select();
                } else {
                    // 두 번째 과일 선택
                    if (this.selectedFruit.data.name === clickedFruit.data.name) {
                        // 짝이 맞은 경우 (성공)
                        this.selectedFruit.match();
                        clickedFruit.match();
                        this.score += 10;
                        this.selectedFruit = null; // 선택 해제
                        
                        // 모든 과일이 사라졌는지 확인
                        if (this.fruits.every(f => f.isMatched)) {
                            // 모두 맞추면 보너스 시간 5초 및 과일 재배치
                            this.timeLeft += 5;
                            this.score += 50;
                            setTimeout(() => this.resetAllFruits(), 300); // 잠시 후 재배치
                        }
                    } else {
                        // 짝이 맞지 않는 경우 (실패)
                        this.selectedFruit.deselect();
                        this.selectedFruit = clickedFruit; // 새로 클릭한 과일을 첫 번째로 선택
                        this.selectedFruit.select();
                    }
                }
                this.updateUI();
            },

            resetAllFruits() {
                this.fruits.forEach(fruit => fruit.respawn());
                this.selectedFruit = null;
            },

            updateUI() {
                document.getElementById('timer').innerText = this.timeLeft;
                document.getElementById('score').innerText = this.score;
            },

            endGame() {
                clearInterval(this.timerInterval);
                
                // 최고 기록 갱신
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    localStorage.setItem('fruitBestScore', this.bestScore);
                }

                // 게임 오버 화면 업데이트 및 표시
                document.getElementById('final-score').innerText = this.score;
                document.getElementById('final-best').innerText = this.bestScore;
                document.getElementById('game-over').style.display = 'flex';
            }
        };

        // 게임 시작
        Game.init();
    </script>
</body>
</html>
