<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>과일 짝 맞추기 게임</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #ui { text-align: center; margin-bottom: 20px; }
        .score-board { display: flex; gap: 20px; font-size: 1.2rem; justify-content: center; margin-top: 10px; }
        
        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: #34495e;
            border: 5px solid #ecf0f1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .fruit {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 4px solid transparent;
            transition: transform 0.1s;
            background-color: rgba(255,255,255,0.1);
        }
        .fruit:hover { transform: scale(1.1); }
        .fruit.selected {
            border-color: #f1c40f;
            background-color: rgba(241, 196, 15, 0.2);
        }

        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* 기본적으로 숨김 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        button {
            margin-top: 20px; padding: 10px 25px;
            font-size: 1.2rem; background: #2ecc71; color: white;
            border: none; border-radius: 5px; cursor: pointer;
        }
        button:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Fruit Matcher</h1>
        <p>같은 과일을 연속으로 2번 클릭하세요!</p>
        <div class="score-board">
            <div>시간: <span id="timer">60</span>s</div>
            <div>점수: <span id="score">0</span></div>
        </div>
    </div>

    <div id="game-container">
        <div id="game-over-screen">
            <h2 style="font-size: 3rem; color: #e74c3c;">Game Over!</h2>
            <p style="font-size: 1.5rem;">최종 점수: <span id="final-score">0</span></p>
            <button onclick="location.reload()">다시 시작</button>
        </div>
    </div>

    <script>
        const fruitsData = [
            { icon: '🍎', name: 'apple' }, { icon: '🍇', name: 'grape' },
            { icon: '🍊', name: 'orange' }, { icon: '🍋', name: 'lemon' },
            { icon: '🍌', name: 'banana' }, { icon: '🍉', name: 'melon' },
            { icon: '🍓', name: 'berry' }, { icon: '🍑', name: 'peach' },
            { icon: '🍍', name: 'pine' }, { icon: '🥝', name: 'kiwi' }
        ];

        const gameContainer = document.getElementById('game-container');
        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score');
        
        let score = 0;
        let timeLeft = 60;
        let selectedFruit = null;
        let fruits = [];

        function initGame() {
            // 과일 쌍 생성 (총 20개)
            const gameFruits = [...fruitsData, ...fruitsData];
            
            gameFruits.forEach((data, index) => {
                const el = document.createElement('div');
                el.className = 'fruit';
                el.innerHTML = data.icon;
                
                const fruitObj = {
                    el: el,
                    name: data.name,
                    isMatched: false,
                    x: Math.random() * 720,
                    y: Math.random() * 420
                };

                el.style.left = fruitObj.x + 'px';
                el.style.top = fruitObj.y + 'px';
                
                el.onclick = () => handleMatch(fruitObj);
                
                gameContainer.appendChild(el);
                fruits.push(fruitObj);
            });

            // 타이머 시작
            const timerId = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    showGameOver();
                }
            }, 1000);
        }

        function handleMatch(clicked) {
            if (clicked.isMatched || clicked === selectedFruit) return;

            clicked.el.classList.add('selected');

            if (!selectedFruit) {
                selectedFruit = clicked;
            } else {
                if (selectedFruit.name === clicked.name) {
                    // 매칭 성공
                    clicked.isMatched = true;
                    selectedFruit.isMatched = true;
                    clicked.el.style.visibility = 'hidden';
                    selectedFruit.el.style.visibility = 'hidden';
                    score += 10;
                    scoreEl.innerText = score;
                    selectedFruit = null;

                    // 전부 다 맞췄는지 확인
                    if (fruits.every(f => f.isMatched)) {
                        alert("대단해요! 모든 과일을 찾았습니다.");
                        location.reload();
                    }
                } else {
                    // 매칭 실패
                    const first = selectedFruit;
                    setTimeout(() => {
                        first.el.classList.remove('selected');
                        clicked.el.classList.remove('selected');
                    }, 300);
                    selectedFruit = null;
                }
            }
        }

        function showGameOver() {
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        // 실행
        window.onload = initGame;
    </script>
</body>
</html>
