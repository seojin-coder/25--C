<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Fruit Matcher - Hard</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --bg-dark: #0a0a12;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(0,255,255,0.5));
        }

        .stats-container {
            display: flex;
            gap: 40px;
            margin-top: 15px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item span { font-weight: bold; font-size: 1.4rem; color: var(--neon-blue); }

        #game-board {
            position: relative;
            width: 900px;
            height: 600px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(0,255,255,0.1);
        }

        .fruit {
            position: absolute;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            user-select: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.1s, border 0.3s, box-shadow 0.3s;
        }

        .fruit:hover {
            transform: scale(1.1) !important;
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .fruit.selected {
            border: 3px solid var(--neon-pink);
            box-shadow: 0 0 25px var(--neon-pink);
            background: rgba(255, 0, 255, 0.1);
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .btn-restart {
            margin-top: 30px;
            padding: 15px 40px;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-restart:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Neon Slicer</h1>
        <div class="stats-container">
            <div class="stat-item">TIME: <span id="timer">45</span>s</div>
            <div class="stat-item">SCORE: <span id="score">0</span></div>
        </div>
    </div>

    <div id="game-board">
        <div id="overlay">
            <h2 id="msg" style="font-size: 3rem; margin: 0;">GAME OVER</h2>
            <p style="font-size: 1.5rem; color: #888;">FINAL SCORE: <span id="final-score">0</span></p>
            <button class="btn-restart" onclick="location.reload()">Reboot System</button>
        </div>
    </div>

    <script>
        const FRUITS_CONFIG = [
            { icon: '🍎', name: 'A' }, { icon: '🍇', name: 'B' },
            { icon: '🍊', name: 'C' }, { icon: '🍋', name: 'D' },
            { icon: '🍌', name: 'E' }, { icon: '🍉', name: 'F' },
            { icon: '🍓', name: 'G' }, { icon: '🍑', name: 'H' },
            { icon: '🍍', name: 'I' }, { icon: '🥝', name: 'J' }
        ];

        const board = document.getElementById('game-board');
        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score');
        
        let score = 0;
        let timeLeft = 45; // 난이도 조절: 시간 단축
        let selected = null;
        let fruitObjects = [];
        let gameActive = true;

        function createFruits() {
            const pairList = [...FRUITS_CONFIG, ...FRUITS_CONFIG];
            
            pairList.forEach((data) => {
                const el = document.createElement('div');
                el.className = 'fruit';
                el.innerHTML = data.icon;
                
                const obj = {
                    el: el,
                    name: data.name,
                    x: Math.random() * 800,
                    y: Math.random() * 500,
                    vx: (Math.random() - 0.5) * 4, // 난이도 조절: 이동 속도
                    vy: (Math.random() - 0.5) * 4,
                    isMatched: false
                };

                el.onclick = () => handleSelect(obj);
                board.appendChild(el);
                fruitObjects.push(obj);
            });
        }

        function updatePhysics() {
            if (!gameActive) return;

            fruitObjects.forEach(obj => {
                if (obj.isMatched) return;

                obj.x += obj.vx;
                obj.y += obj.vy;

                // 벽 충돌 감지
                if (obj.x <= 0 || obj.x >= 830) obj.vx *= -1;
                if (obj.y <= 0 || obj.y >= 530) obj.vy *= -1;

                obj.el.style.transform = `translate(${obj.x}px, ${obj.y}px)`;
            });

            requestAnimationFrame(updatePhysics);
        }

        function handleSelect(clicked) {
            if (!gameActive || clicked.isMatched || clicked === selected) return;

            clicked.el.classList.add('selected');

            if (!selected) {
                selected = clicked;
            } else {
                if (selected.name === clicked.name) {
                    // Success
                    const s1 = selected;
                    const s2 = clicked;
                    s1.isMatched = s2.isMatched = true;
                    score += 20;
                    scoreEl.innerText = score;
                    
                    setTimeout(() => {
                        s1.el.style.opacity = '0';
                        s2.el.style.opacity = '0';
                        s1.el.style.pointerEvents = 'none';
                        s2.el.style.pointerEvents = 'none';
                    }, 200);
                    
                    selected = null;
                    checkWin();
                } else {
                    // Fail
                    const first = selected;
                    setTimeout(() => {
                        first.el.classList.remove('selected');
                        clicked.el.classList.remove('selected');
                    }, 300);
                    selected = null;
                }
            }
        }

        function checkWin() {
            if (fruitObjects.every(f => f.isMatched)) {
                gameActive = false;
                document.getElementById('msg').innerText = "SYSTEM CLEARED";
                document.getElementById('msg').style.color = "var(--neon-green)";
                showGameOver();
            }
        }

        function showGameOver() {
            gameActive = false;
            document.getElementById('final-score').innerText = score;
            document.getElementById('overlay').style.display = 'flex';
        }

        // Timer
        const timerId = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerId);
                showGameOver();
            }
        }, 1000);

        // Start
        createFruits();
        updatePhysics();
    </script>
</body>
</html>
