<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon Fruit Matcher - Stages</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --bg-dark: #0a0a12;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui { text-align: center; margin-bottom: 20px; z-index: 10; }
        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-container {
            display: flex; gap: 30px; margin-top: 15px;
            padding: 10px 30px; background: rgba(255, 255, 255, 0.05);
            border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-item b { color: var(--neon-blue); font-size: 1.2rem; }
        #stage-display { color: var(--neon-green); font-weight: bold; }

        #game-board {
            position: relative;
            width: 900px;
            height: 600px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
        }

        .fruit {
            position: absolute;
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            font-size: 50px; cursor: pointer; user-select: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: border 0.3s, box-shadow 0.3s, background 0.3s;
        }

        .fruit:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            z-index: 10;
        }

        .fruit.selected {
            border: 3px solid var(--neon-pink);
            box-shadow: 0 0 25px var(--neon-pink);
            background: rgba(255, 0, 255, 0.2);
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .btn-next {
            margin-top: 30px; padding: 15px 40px;
            background: transparent; color: var(--neon-green);
            border: 2px solid var(--neon-green);
            font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase;
        }
        .btn-next:hover { background: var(--neon-green); color: black; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Neon Slicer</h1>
        <div class="stats-container">
            <div class="stat-item">STAGE: <span id="stage-display">1</span></div>
            <div class="stat-item">TIME: <b id="timer">60</b>s</div>
            <div class="stat-item">SCORE: <b id="score">0</b></div>
        </div>
    </div>

    <div id="game-board">
        <div id="overlay">
            <h2 id="msg" style="font-size: 3rem; margin: 0;">STAGE CLEAR</h2>
            <p id="sub-msg" style="font-size: 1.5rem; color: #888;">Next level is ready.</p>
            <button class="btn-next" id="action-btn" onclick="nextStage()">Next System</button>
        </div>
    </div>

    <script>
        const ALL_FRUITS = ['🍎', '🍇', '🍊', '🍋', '🍌', '🍉', '🍓', '🍑', '🍍', '🥝', '🥭', '🍒'];
        
        const board = document.getElementById('game-board');
        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score');
        const stageEl = document.getElementById('stage-display');
        const overlay = document.getElementById('overlay');
        
        let currentStage = 1;
        let score = 0;
        let timeLeft = 60;
        let selected = null;
        let fruitObjects = [];
        let gameActive = false;
        let timerId = null;

        // 스테이지별 설정 (과일 쌍의 개수, 기본 속도)
        const stageSettings = {
            1: { pairs: 3, speed: 1.5 }, // 과일 6개
            2: { pairs: 4.5, speed: 2.2 }, // 과일 9개 (하나는 3개 묶음 처리 방지 위해 9개 근사치 조정 필요)
            // 9개를 정확히 맞추기 위해 4쌍 + 보너스 1개는 로직상 복잡하므로 
            // 짝 맞추기 게임 특성상 6개(3쌍), 10개(5쌍), 14개(7쌍) 혹은 
            // 요청하신 6, 9, 12 수치에 맞춰 3쌍, 5쌍, 6쌍으로 구성하겠습니다.
            1: { pairs: 3, speed: 1.5 }, // 6개
            2: { pairs: 5, speed: 2.2 }, // 10개 (9개에 가장 가까운 짝수)
            3: { pairs: 6, speed: 3.0 }  // 12개
        };

        function initStage(stage) {
            board.querySelectorAll('.fruit').forEach(f => f.remove());
            overlay.style.display = 'none';
            fruitObjects = [];
            selected = null;
            gameActive = true;
            timeLeft = 60;
            
            const config = stageSettings[stage] || stageSettings[3];
            const stageFruits = ALL_FRUITS.slice(0, config.pairs);
            const pairList = [...stageFruits, ...stageFruits];
            
            // 배열 셔플
            pairList.sort(() => Math.random() - 0.5);

            pairList.forEach((icon, index) => {
                const el = document.createElement('div');
                el.className = 'fruit';
                el.innerHTML = icon;
                
                const obj = {
                    el: el,
                    name: icon,
                    x: Math.random() * 800,
                    y: Math.random() * 500,
                    vx: (Math.random() - 0.5) * config.speed * 2,
                    vy: (Math.random() - 0.5) * config.speed * 2,
                    isMatched: false,
                    isHovered: false
                };

                el.onmouseenter = () => { obj.isHovered = true; };
                el.onmouseleave = () => { obj.isHovered = false; };
                el.onclick = () => handleSelect(obj);

                board.appendChild(el);
                fruitObjects.push(obj);
            });

            if(timerId) clearInterval(timerId);
            timerId = setInterval(updateTimer, 1000);
        }

        function updatePhysics() {
            if (gameActive) {
                fruitObjects.forEach(obj => {
                    if (obj.isMatched) return;
                    if (!obj.isHovered) {
                        obj.x += obj.vx;
                        obj.y += obj.vy;
                        if (obj.x <= 0 || obj.x >= 820) obj.vx *= -1;
                        if (obj.y <= 0 || obj.y >= 520) obj.vy *= -1;
                    }
                    obj.el.style.transform = `translate(${obj.x}px, ${obj.y}px)`;
                });
            }
            requestAnimationFrame(updatePhysics);
        }

        function handleSelect(clicked) {
            if (!gameActive || clicked.isMatched || clicked === selected) return;
            clicked.el.classList.add('selected');

            if (!selected) {
                selected = clicked;
            } else {
                if (selected.name === clicked.name) {
                    selected.isMatched = clicked.isMatched = true;
                    const s1 = selected; const s2 = clicked;
                    score += (currentStage * 10);
                    scoreEl.innerText = score;
                    setTimeout(() => {
                        s1.el.style.display = 'none';
                        s2.el.style.display = 'none';
                    }, 200);
                    selected = null;
                    if (fruitObjects.every(f => f.isMatched)) winStage();
                } else {
                    const first = selected;
                    setTimeout(() => {
                        first.el.classList.remove('selected');
                        clicked.el.classList.remove('selected');
                    }, 300);
                    selected = null;
                }
            }
        }

        function updateTimer() {
            if(!gameActive) return;
            timeLeft--;
            timerEl.innerText = timeLeft;
            if(timeLeft <= 0) {
                gameActive = false;
                clearInterval(timerId);
                showGameOver();
            }
        }

        function winStage() {
            gameActive = false;
            clearInterval(timerId);
            if (currentStage < 3) {
                document.getElementById('msg').innerText = "STAGE " + currentStage + " CLEAR";
                document.getElementById('action-btn').innerText = "Next Stage";
                overlay.style.display = 'flex';
            } else {
                document.getElementById('msg').innerText = "ALL SYSTEMS CLEARED";
                document.getElementById('action-btn').innerText = "Play Again";
                document.getElementById('sub-msg').innerText = "Final Score: " + score;
                currentStage = 0; // 다시 시작 시 1단게로
                overlay.style.display = 'flex';
            }
        }

        function nextStage() {
            currentStage++;
            stageEl.innerText = currentStage;
            initStage(currentStage);
        }

        function showGameOver() {
            document.getElementById('msg').innerText = "SYSTEM FAILURE";
            document.getElementById('action-btn').innerText = "Reboot";
            document.getElementById('sub-msg').innerText = "Final Score: " + score;
            currentStage = 0;
            overlay.style.display = 'flex';
        }

        initStage(1);
        updatePhysics();
    </script>
</body>
</html>
